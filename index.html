<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finanças Pessoais</title>
  <!-- Biblioteca de Gráficos Leve -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-principal: #121212;
      --bg-card: #1e1e1e;
      --bg-input: #2d2d2d;
      --primary: #bb86fc;
      --verde: #00c853;
      --vermelho: #d50000;
      --texto: #ffffff;
      --texto-secundario: #a0a0a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-principal); color: var(--texto); padding-bottom: 80px; }

    .container { max-width: 500px; margin: 0 auto; padding: 20px; }
    
    /* Topo e Seletores */
    .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    select { background: var(--bg-input); color: var(--texto); border: 1px solid #333; padding: 8px 12px; border-radius: 8px; font-size: 16px; }

    /* Cards Visuais */
    .card { background: var(--bg-card); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; position: relative; }
    .visor { font-size: 36px; font-weight: bold; margin: 15px 0; color: var(--texto); }
    .balanco-linha { display: flex; justify-content: space-between; margin-top: 10px; }
    .balanco-box { width: 48%; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.05); }

    /* Teclado e Inputs */
    .teclado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    .tecla { background: var(--bg-input); border: none; color: var(--texto); padding: 15px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; }
    .tecla:active { background: #444; }
    .input-texto { width: 100%; padding: 14px; background: var(--bg-input); border: 1px solid #333; color: var(--texto); border-radius: 12px; margin-bottom: 15px; font-size: 16px; }
    
    /* Botões de Ação */
    .btn-group { display: flex; gap: 10px; }
    .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
    .btn-gasto { background: var(--vermelho); }
    .btn-ganho { background: var(--verde); color: #000; }
    .btn:active { transform: scale(0.98); }

    /* Lista de Extrato */
    .lista-itens { margin-top: 20px; }
    .item-linha { display: flex; justify-content: space-between; background: var(--bg-card); padding: 15px; border-radius: 12px; margin-bottom: 8px; align-items: center; }
    .item-info { display: flex; flex-direction: column; }
    .item-data { font-size: 12px; color: var(--texto-secundario); }

    /* Alerta de Teto */
    .alerta-teto { border: 2px solid var(--vermelho) !important; background: rgba(213, 0, 0, 0.1) !important; }

    /* Navegação de Abas Inferior */
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid #222; max-width: 500px; margin: 0 auto; border-radius: 16px 16px 0 0; }
    .nav-item { color: var(--texto-secundario); cursor: pointer; font-size: 14px; font-weight: bold; text-decoration: none; padding: 8px 16px; border-radius: 8px; }
    .nav-item.active { color: var(--primary); background: rgba(187, 134, 252, 0.1); }

    .aba-conteudo { display: none; }
    .aba-conteudo.active { display: block; }
    
    .grafico-container { background: var(--bg-card); padding: 15px; border-radius: 16px; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Topo Geral -->
    <div class="header-app">
      <select id="select-mes" onchange="atualizarInterface()"></select>
      <select id="select-ano" onchange="atualizarInterface()"></select>
    </div>

    <!-- ABA 1: LANÇAMENTOS -->
    <div id="aba-lancamentos" class="aba-conteudo active">
      <div class="card">
        <div style="color: var(--texto-secundario); font-size: 14px;">Valor do Lançamento</div>
        <div class="visor" id="visor">R$ 0,00</div>
        
        <div class="teclado">
          <button class="tecla" onclick="pressionarTecla('1')">1</button>
          <button class="tecla" onclick="pressionarTecla('2')">2</button>
          <button class="tecla" onclick="pressionarTecla('3')">3</button>
          <button class="tecla" onclick="pressionarTecla('4')">4</button>
          <button class="tecla" onclick="pressionarTecla('5')">5</button>
          <button class="tecla" onclick="pressionarTecla('6')">6</button>
          <button class="tecla" onclick="pressionarTecla('7')">7</button>
          <button class="tecla" onclick="pressionarTecla('8')">8</button>
          <button class="tecla" onclick="pressionarTecla('9')">9</button>
          <button class="tecla" onclick="limparVisor()" style="color: var(--vermelho)">C</button>
          <button class="tecla" onclick="pressionarTecla('0')">0</button>
          <button class="tecla" onclick="pressionarTecla('back')">⌫</button>
        </div>
      </div>

      <input type="text" id="input-desc" class="input-texto" placeholder="Descrição ou Tag (Ex: Supermercado)">
      
      <div class="btn-group">
        <button class="btn btn-gasto" onclick="salvarLancamento('Gastei')">🔴 Gastei</button>
        <button class="btn btn-ganho" onclick="salvarLancamento('Ganhei')">🟢 Ganhei</button>
      </div>

      <div class="lista-itens" id="extrato-lista"></div>
    </div>

    <!-- ABA 2: CONFIGURAÇÕES DE METAS -->
    <div id="aba-metas" class="aba-conteudo">
      <h3 style="margin-bottom: 15px;">Definir Tetos Mensais</h3>
      <input type="text" id="meta-categoria" class="input-texto" placeholder="Categoria (Ex: Supermercado)">
      <input type="number" id="meta-valor" class="input-texto" placeholder="Teto Limite (R$)">
      <button class="btn" style="background: var(--primary); color: #000; width: 100%; margin-bottom: 20px;" onclick="salvarMeta()">Definir Limite</button>
      
      <div id="lista-metas-painel"></div>
    </div>

    <!-- ABA 3: BALANÇO ANUAL -->
    <div id="aba-balanco" class="aba-conteudo">
      <div class="card">
        <div style="font-weight: bold; margin-bottom: 10px;">Resumo do Mês Selecionado</div>
        <div class="balanco-linha">
          <div class="balanco-box" style="color: var(--verde)">Ganhos<br><span id="total-ganhos">R$ 0,00</span></div>
          <div class="balanco-box" style="color: var(--vermelho)">Gastos<br><span id="total-gastos">R$ 0,00</span></div>
        </div>
        <div style="margin-top: 15px; font-size: 18px;">Sobra: <span id="total-sobra" style="font-weight: bold;">R$ 0,00</span></div>
      </div>

      <div class="grafico-container">
        <canvas id="meuGrafico"></canvas>
      </div>
    </div>

  </div>

  <!-- Barra de Navegação Fixa -->
  <div class="nav-bar">
    <div class="nav-item active" onclick="mudarAba('lancamentos', this)">Lançamentos</div>
    <div class="nav-item" onclick="mudarAba('metas', this)">Metas/Tetos</div>
    <div class="nav-item" onclick="mudarAba('balanco', this)">Balanço Anual</div>
  </div>

  <script>
    // Inicialização do Banco de Dados Interno
    let dados = JSON.parse(localStorage.getItem('app_financas_dados')) || { lancamentos: [], metas: {} };
    let digitosVisor = "0";
    let meuChart = null;

    // Configuração Inicial de Datas e Seletores Automáticos
    const mesesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    
    function inicializarSeletores() {
      const dataAtual = new Date();
      const sMes = document.getElementById('select-mes');
      const sAno = document.getElementById('select-ano');
      
      mesesNomes.forEach((m, idx) => {
        let opt = document.createElement('option');
        opt.value = idx;
        opt.innerText = m;
        if(idx === dataAtual.getMonth()) opt.selected = true;
        sMes.appendChild(opt);
      });

      const anoAtual = dataAtual.getFullYear();
      for(let i = anoAtual - 1; i <= anoAtual + 2; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = i;
        if(i === anoAtual) opt.selected = true;
        sAno.appendChild(opt);
      }
    }

    // Lógica do Teclado Numérico
    function pressionarTecla(k) {
      if(k === 'back') {
        digitosVisor = digitosVisor.slice(0, -1);
        if(digitosVisor === "") digitosVisor = "0";
      } else {
        if(digitosVisor === "0") digitosVisor = k;
        else digitosVisor += k;
      }
      renderizarVisor();
    }

    function limparVisor() { digitosVisor = "0"; renderizarVisor(); }
    
    function renderizarVisor() {
      let v = parseInt(digitosVisor, 10) / 100;
      document.getElementById('visor').innerText = v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // Salvar e Processar Lançamentos
    function salvarLancamento(tipo) {
      let valor = parseInt(digitosVisor, 10) / 100;
      let desc = document.getElementById('input-desc').value.trim();
      let mes = document.getElementById('select-mes').value;
      let ano = document.getElementById('select-ano').value;

      if(valor <= 0) return alert("Por favor, digite um valor maior que zero!");
      if(desc === "") return alert("Insira uma descrição ou categoria!");

      let novoItem = {
        id: Date.now(),
        valor: valor,
        descricao: desc,
        tipo: tipo,
        mes: parseInt(mes),
        ano: parseInt(ano),
        dataCriacao: new Date().toLocaleDateString('pt-BR')
      };

      dados.lancamentos.push(novoItem);
      salvarNoStorage();
      limparVisor();
      document.getElementById('input-desc').value = "";
      atualizarInterface();
      alert("Lançamento salvo com sucesso!");
    }

    // Salvar Metas/Tetos
    function salvarMeta() {
      let cat = document.getElementById('meta-categoria').value.trim().toLowerCase();
      let val = parseFloat(document.getElementById('meta-valor').value);

      if(cat === "" || isNaN(val)) return alert("Preencha todos os campos corretamente!");

      dados.metas[cat] = val;
      salvarNoStorage();
      document.getElementById('meta-categoria').value = "";
      document.getElementById('meta-valor').value = "";
      atualizarInterface();
    }

    function salvarNoStorage() {
      localStorage.setItem('app_financas_dados', JSON.stringify(dados));
    }

    // Atualização Geral da Interface
    function atualizarInterface() {
      let mSel = parseInt(document.getElementById('select-mes').value);
      let aSel = parseInt(document.getElementById('select-ano').value);

      // Filtrar lançamentos do mês/ano selecionado
      let filtrados = dados.lancamentos.filter(i => i.mes === mSel && i.ano === aSel);

      // Calcular Totais
      let ganhos = 0; let gastos = 0;
      let totaisPorCategoria = {};

      filtrados.forEach(i => {
        if(i.tipo === 'Ganhei') ganhos += i.valor;
        else {
          gastos += i.valor;
          let catKey = i.descricao.toLowerCase();
          totaisPorCategoria[catKey] = (totaisPorCategoria[catKey] || 0) + i.valor;
        }
      });

      // Renderizar Resumos Financeiros
      document.getElementById('total-ganhos').innerText = ganhos.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      document.getElementById('total-gastos').innerText = gastos.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      let sobra = ganhos - gastos;
      let elSobra = document.getElementById('total-sobra');
      elSobra.innerText = sobra.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      elSobra.style.color = sobra >= 0 ? "var(--verde)" : "var(--vermelho)";

      // Renderizar Lista de Extrato com Validação de Estouro de Teto
      let htmlExtrato = "";
      filtrados.reverse().forEach(i => {
        let catKey = i.descricao.toLowerCase();
        let tetoDaCategoria = dados.metas[catKey];
        let estourou = tetoDaCategoria && totaisPorCategoria[catKey] > tetoDaCategoria;

        htmlExtrato += `
          <div class="item-linha ${estourou && i.tipo === 'Gastei' ? 'alerta-teto' : ''}">
            <div class="item-info">
              <span style="font-weight:bold;">${i.descricao} ${estourou && i.tipo === 'Gastei' ? '⚠️' : ''}</span>
              <span class="item-data">${i.dataCriacao}</span>
            </div>
            <span style="color: ${i.tipo === 'Ganhei' ? 'var(--verde)' : 'var(--vermelho)'}; font-weight:bold;">
              ${i.tipo === 'Ganhei' ? '+' : '-'} R$ ${i.valor.toFixed(2)}
            </span>
          </div>
        `;
      });
      document.getElementById('extrato-lista').innerHTML = htmlExtrato || "<p style='text-align:center; color:gray;'>Nenhum lançamento este mês.</p>";

      // Renderizar Painel de Metas
      let htmlMetas = "";
      for (let cat in dados.metas) {
        let gastoAtual = totaisPorCategoria[cat] || 0;
        let limite = dados.metas[cat];
        let pct = Math.min((gastoAtual / limite) * 100, 100);

        htmlMetas += `
          <div class="card" style="text-align:left; padding:15px;">
            <div style="display:flex; justify-content:space-between; font-weight:bold; text-transform:capitalize;">
              <span>${cat}</span>
              <span>R$ ${gastoAtual.toFixed(2)} / R$ ${limite.toFixed(2)}</span>
            </div>
            <div style="background:#444; width:100%; height:8px; border-radius:4px; margin-top:8px; overflow:hidden;">
              <div style="background: ${gastoAtual > limite ? 'var(--vermelho)' : 'var(--primary)'}; width: ${pct}%; height:100%;"></div>
            </div>
          </div>
        `;
      }
      document.getElementById('lista-metas-painel').innerHTML = htmlMetas || "<p style='text-align:center; color:gray;'>Nenhum teto configurado.</p>";

      // Atualizar Gráfico Anual
      gerarDadosGrafico(aSel);
    }

    // Gerar e Alimentar o Gráfico de Barras (Chart.js)
    function generarDadosGrafico(anoSelecionado) {
      let gMeses = Array(12).fill(0);
      let cMeses = Array(12).fill(0);

      dados.lancamentos.forEach(i => {
        if(i.ano === anoSelecionado) {
          if(i.tipo === 'Ganhei') gMeses[i.mes] += i.valor;
          else cMeses[i.mes] += i.valor;
        }
      });

      const ctx = document.getElementById('meuGrafico').getContext('2d');
      
      if(meuChart) meuChart.destroy();

      meuChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: mesesNomes.map(m => m.substring(0,3)),
          datasets: [
            { label: 'Ganhos', data: gMeses, backgroundColor: '#00c853' },
            { label: 'Gastos', data: cMeses, backgroundColor: '#d50000' }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#fff' } } },
          scales: {
            x: { ticks: { color: '#fff' } },
            y: { ticks: { color: '#fff' } }
          }
        }
      });
    }

    // Navegação de Abas
    function mudarAba(abaId, elemento) {
      document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      
      document.getElementById('aba-' + abaId).classList.add('active');
      elemento.classList.add('active');
    }

    // Inicialização da Página
    window.onload = function() {
      inicializarSeletores();
      atualizarInterface();
    };
  </script>
</body>
</html>
