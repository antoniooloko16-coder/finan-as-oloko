<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADOW LEGENDS: RETRO ACTIVE</title>
    <style>
        :root {
            --retro-blue: #000080;
            --retro-blue-light: #0000ff;
            --retro-border: #808080;
            --retro-border-light: #ffffff;
            --raro: #ffcc00;
            --comum: #888;
            --hp-gold: linear-gradient(90deg, #ffcc00, #fffa65);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: #000; color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; font-weight: bold;
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
            image-rendering: pixelated;
        }

        /* --- CENÁRIO DE BATALHA PIXEL ART STYLE --- */
        #game-arena {
            position: relative; width: 100%; height: 60vh;
            background: linear-gradient(to bottom, #7bb3eb 0%, #a4cbe3 40%, #c9cf9e 60%, #529442 80%, #3d7331 100%);
            border-bottom: 4px solid #1a3314; overflow: hidden;
        }

        /* Camada de Montanhas Clássicas Reais por Gradiente */
        #game-arena::before {
            content: ''; position: absolute; bottom: 30px; left: 0; width: 100%; height: 120px;
            background: 
                radial-gradient(circle at 20% 120%, #765c43 0%, #513e2d 50%, transparent 51%),
                radial-gradient(circle at 50% 130%, #68523c 0%, #463728 60%, transparent 61%),
                radial-gradient(circle at 80% 120%, #765c43 0%, #513e2d 50%, transparent 51%);
            z-index: 1; opacity: 0.9;
        }

        /* Chão com Flores da Imagem */
        .floor { 
            position: absolute; bottom: 0; width: 100%; height: 40px; 
            background: #448037; z-index: 2;
            box-shadow: inset 0 10px 0 #529442;
        }
        .floor::after {
            content: ''; position: absolute; top: 15px; width: 100%; height: 10px;
            background: radial-gradient(circle, #fff 20%, transparent 20%) 0 0/15px 15px,
                        radial-gradient(circle, #ffcc00 20%, transparent 20%) 7px 7px/20px 20px;
            opacity: 0.7;
        }

        /* --- SPRITES INTERATIVOS (ESTILO RETRÔ) --- */
        .character { position: absolute; z-index: 5; transition: all 0.15s ease-out; }
        
        #player { bottom: 35px; right: 15%; width: 50px; height: 75px; }
        #ally1 { bottom: 75px; right: 28%; width: 45px; height: 70px; }
        #ally2 { bottom: 5px; right: 8%; width: 45px; height: 70px; }
        
        #monster { bottom: 25px; left: 15%; width: 110px; height: 90px; }
        #monster2 { bottom: 65px; left: 5%; width: 90px; height: 80px; }

        /* Renderizadores Visuais dos Sprites */
        .sprite-body {
            width: 100%; height: 100%; position: relative;
            border-radius: 6px; border: 3px solid #000;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
        }
        .hero-hair { position: absolute; top: -5px; left: -2px; width: 105%; height: 25px; border-radius: 4px; border-bottom: 3px solid #000; }
        .hero-cloak { position: absolute; top: 20px; left: -6px; width: 25px; height: 80%; border-radius: 4px; border: 3px solid #000; }
        
        /* EFEITO DE CORTE / SLASH ANIMATION */
        .slash-effect {
            position: absolute; width: 120px; height: 120px;
            border: 8px solid #fff; border-color: #fff transparent transparent transparent;
            border-radius: 50%/40px 0 0 0; transform: rotate(-45deg);
            z-index: 20; pointer-events: none; opacity: 0;
            filter: drop-shadow(0 0 8px #00c6ff);
        }
        @keyframes slashAnim {
            0% { transform: translate(0, 0) rotate(-45deg) scale(0.5); opacity: 1; }
            50% { border-color: #fff #0072ff transparent transparent; }
            100% { transform: translate(-40px, 40px) rotate(-120deg) scale(1.3); opacity: 0; }
        }
        .hit-flash { animation: flashBg 0.15s ease-out 2; }
        @keyframes flashBg { 0%, 100% { background: transparent; } 50% { background: rgba(255,255,255,0.6); } }

        /* --- CLÁSSICO PAINEL AZUL METÁLICO (100% FIEL À IMAGEM) --- */
        .retro-ui-panel {
            flex: 1; background: linear-gradient(135deg, #000066 0%, #000022 100%);
            border: 4px solid var(--retro-border);
            box-shadow: inset 2px 2px 0 var(--retro-border-light), inset -2px -2px 0 #333, 0 0 15px rgba(0,0,0,0.8);
            margin: 4px; padding: 12px; display: flex; gap: 10px;
            border-radius: 5px; position: relative;
        }

        /* Sub-painéis internos com divisórias duplas */
        .menu-commands {
            width: 35%; border: 3px solid var(--retro-border);
            box-shadow: inset 1px 1px 0 var(--retro-border-light);
            padding: 10px; display: flex; flex-direction: column; justify-content: space-between;
            background: rgba(0,0,0,0.2); text-transform: uppercase; letter-spacing: 1px;
        }
        .menu-item {
            display: flex; align-items: center; cursor: pointer; padding: 4px 0;
            font-size: 16px; text-shadow: 2px 2px 0 #000;
        }
        .menu-item:hover .finger-indicator { opacity: 1; }
        .finger-indicator {
            width: 18px; height: 14px; margin-right: 8px; opacity: 0;
            background: #fff; border-radius: 3px; border: 2px solid #000;
            position: relative;
        }
        .finger-indicator::after {
            content: ''; position: absolute; right: -6px; top: 3px;
            width: 6px; height: 4px; background: #000;
        }

        .status-window {
            flex: 1; border: 3px solid var(--retro-border);
            box-shadow: inset 1px 1px 0 var(--retro-border-light);
            padding: 8px; display: flex; flex-direction: column; gap: 6px;
            background: rgba(0,0,0,0.2); overflow-y: auto;
        }
        .status-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 15px; text-transform: uppercase; text-shadow: 2px 2px 0 #000;
        }
        .char-name { color: #ffffff; letter-spacing: 1px; }
        .char-name.active-turn { color: var(--raro); }
        .char-hp-val { width: 80px; text-align: right; color: #fff; font-family: monospace; }
        
        /* Barras horizontais idênticas à imagem */
        .retro-bar-container { width: 90px; height: 10px; background: #333; border: 1px solid #fff; border-radius: 2px; overflow: hidden; }
        .retro-bar-fill { height: 100%; background: var(--hp-gold); width: 100%; transition: width 0.2s; }

        /* POPUPS DE DANOS CRUGUENTOS */
        .dmg-popup { 
            position: absolute; font-size: 28px; font-weight: 900; pointer-events: none;
            animation: retroDmg 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            font-family: 'Impact', 'Arial Black', sans-serif;
            -webkit-text-stroke: 2px #000; text-shadow: 3px 3px 0 #000; z-index: 100;
        }
        @keyframes retroDmg {
            0% { transform: translateY(20px) scale(0.4); opacity: 0; }
            30% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            70% { transform: translateY(-45px) scale(1.0); opacity: 1; }
            100% { transform: translateY(-60px) scale(0.9); opacity: 0; }
        }
        .shake { animation: arenaShake 0.2s ease-in-out; }
        @keyframes arenaShake { 0%,100% {transform:translateX(0);} 25% {transform:translateX(-8px);} 75% {transform:translateX(8px);} }

        /* MODAL DE SELEÇÃO */
        .modal { position: fixed; inset: 0; background: #000022; z-index: 1000; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 6px solid var(--retro-border); }
        .class-select { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .class-btn { background: #000044; border: 2px solid var(--retro-border); color: white; padding: 12px; font-family: monospace; font-weight: bold; cursor: pointer; }
        .class-btn.active { border-color: var(--raro); background: #000088; }
        .start-btn { background: #cc0000; color: white; border: 3px solid #ff6666; padding: 15px 40px; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- SELEÇÃO RETRÔ -->
    <div id="screen-setup" class="modal">
        <h2 style="color:var(--raro); letter-spacing: 2px; text-shadow: 2px 2px #000;">NOME DO LÍDER:</h2>
        <input type="text" id="p-name" value="LIGHTNING" style="width:80%; padding:10px; background:#000; border:2px solid var(--retro-border); color:white; font-family:monospace; text-align:center;">
        
        <div class="class-select">
            <button class="class-btn active" onclick="selClass('Guerreiro', this)">GUERREIRO</button>
            <button class="class-btn" onclick="selClass('Mago', this)">MAGO</button>
            <button class="class-btn" onclick="selClass('Arqueiro', this)">ARQUEIRO</button>
            <button class="class-btn" onclick="selClass('Assassino', this)">ASSASSINO</button>
        </div>
        <button class="start-btn" onclick="startGame()">ENTER ARENA</button>
    </div>

    <!-- TELA PRINCIPAL DO JOGO -->
    <div id="game-main" style="display:none; flex-direction: column; height: 100%;">
        
        <!-- ARENA DE BATALHA ATIVA -->
        <div id="game-arena">
            <div id="flash-overlay" style="position:absolute; inset:0; pointer-events:none; z-index:15;"></div>
            <div id="slash" class="slash-effect"></div>

            <!-- INIMIGOS (LADO ESQUERDO DA IMAGEM) -->
            <div id="monster" class="character">
                <div class="sprite-body" style="background: linear-gradient(135deg, #2b32b2, #141852);">
                    <div style="position:absolute; top:15px; right:15px; width:15px; height:6px; background:#ff0033; box-shadow:0 0 8px #ff0033;"></div>
                    <div style="position:absolute; bottom:10px; left:10px; width:80%; height:12px; background:#cca300; border-radius:3px;"></div>
                </div>
            </div>
            <div id="monster2" class="character">
                <div class="sprite-body" style="background: linear-gradient(135deg, #4b3621, #271a0c);">
                    <div style="position:absolute; top:12px; right:12px; width:10px; height:5px; background:#ffcc00;"></div>
                </div>
            </div>

            <!-- ALIADOS / JOGADORES (LADO DIREITO DA IMAGEM) -->
            <div id="player" class="character">
                <div class="hero-cloak" style="background:#cc0000;"></div>
                <div class="sprite-body" style="background: #e0b094;">
                    <div id="hero-hair-color" class="hero-hair" style="background:#ff9999;"></div>
                </div>
            </div>
            <div id="ally1" class="character">
                <div class="hero-cloak" style="background:#333;"></div>
                <div class="sprite-body" style="background: #d4a373;">
                    <div class="hero-hair" style="background:#ffd343;"></div>
                </div>
            </div>
            <div id="ally2" class="character">
                <div class="hero-cloak" style="background:#1b4d3e;"></div>
                <div class="sprite-body" style="background: #9c6644;">
                    <div class="hero-hair" style="background:#4a3728;"></div>
                </div>
            </div>

            <div class="floor"></div>
        </div>

        <!-- PAINEL DE COMANDO RETRÔ CLÁSSICO -->
        <div class="retro-ui-panel">
            <!-- Menu de Ações Interativas -->
            <div class="menu-commands">
                <div class="menu-item" onclick="triggerAttack()">
                    <div class="finger-indicator"></div>Attack
                </div>
                <div class="menu-item" onclick="triggerMagic()">
                    <div class="finger-indicator"></div>Magic
                </div>
                <div class="menu-item" onclick="triggerSpecial()">
                    <div class="finger-indicator"></div>Summon
                </div>
                <div class="menu-item" onclick="triggerItem()">
                    <div class="finger-indicator"></div>Item
                </div>
            </div>

            <!-- Grade de Status com Barras Estilo ATB -->
            <div class="status-window" id="party-status-box">
                <!-- Inserido via JS -->
            </div>
        </div>
    </div>

<script>
    let party = [
        { name: "LIGHTNING", hp: 4035, maxHp: 4035, active: true },
        { name: "SNOW", hp: 2301, maxHp: 2500, active: false },
        { name: "VANILLE", hp: 168, maxHp: 1900, active: false },
        { name: "SAZH", hp: 3270, maxHp: 3500, active: false }
    ];

    let monsters = [
        { id: "monster", hp: 5000, maxHp: 5000 },
        { id: "monster2", hp: 3000, maxHp: 3000 }
    ];

    let currentClass = "Guerreiro";

    function selClass(c, btn) {
        currentClass = c;
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const hair = document.getElementById('hero-hair-color');
        if(hair) {
            if(c === 'Mago') hair.style.backgroundColor = '#33ffff';
            if(c === 'Arqueiro') hair.style.backgroundColor = '#ffcc00';
            if(c === 'Assassino') hair.style.backgroundColor = '#aa33ff';
            if(c === 'Guerreiro') hair.style.backgroundColor = '#ff9999';
        }
    }

    function startGame() {
        const customName = document.getElementById('p-name').value.toUpperCase();
        if(customName) party[0].name = customName;

        document.getElementById('screen-setup').style.style = 'none';
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('game-main').style.display = 'flex';
        
        renderStatus();
        startAutoEnemyATB();
    }

    function renderStatus() {
        let html = "";
        party.forEach(char => {
            const pct = (char.hp / char.maxHp) * 100;
            html += `
                <div class="status-row">
                    <span class="char-name ${char.active ? 'active-turn' : ''}">${char.name}</span>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span class="char-hp-val">${char.hp}</span>
                        <div class="retro-bar-container">
                            <div class="retro-bar-fill" style="width: ${pct}%"></div>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('party-status-box').innerHTML = html;
    }

    function triggerAttack() {
        // Seleciona monstro vivo
        let target = monsters.find(m => m.hp > 0) || monsters[0];
        const pEl = document.getElementById('player');
        const targetEl = document.getElementById(target.id);
        
        // Dash de Ataque Fiel
        pEl.style.transform = "translateX(-180px) scale(1.1)";
        
        setTimeout(() => {
            // Efeito Slash Visual no Alvo
            const slash = document.getElementById('slash');
            slash.style.left = targetEl.offsetLeft + "px";
            slash.style.top = targetEl.offsetTop + "px";
            slash.style.opacity = "1";
            slash.style.animation = "slashAnim 0.4s ease-out forwards";

            // Aplica Dano Amarelo (Crítico/Forte igual imagem)
            let dmg = Math.floor(500 + Math.random() * 200);
            target.hp = Math.max(0, target.hp - dmg);
            showDmgPopup(dmg, targetEl, '#ffcc00');

            // Flash de Impacto
            document.getElementById('flash-overlay').classList.add('hit-flash');
            setTimeout(() => {
                document.getElementById('flash-overlay').classList.remove('hit-flash');
                slash.style.animation = "";
                slash.style.opacity = "0";
            }, 300);

            // Retorna Posição
            pEl.style.transform = "translateX(0) scale(1)";
            renderStatus();
        }, 150);
    }

    function triggerMagic() {
        let target = monsters.find(m => m.hp > 0) || monsters[0];
        const targetEl = document.getElementById(target.id);
        
        let dmg = Math.floor(800 + Math.random() * 150);
        target.hp = Math.max(0, target.hp - dmg);
        showDmgPopup(dmg, targetEl, '#33ffff');
        
        document.getElementById('game-arena').classList.add('shake');
        setTimeout(() => document.getElementById('game-arena').classList.remove('shake'), 200);
        renderStatus();
    }

    function triggerSpecial() {
        monsters.forEach(m => {
            let dmg = Math.floor(1200 + Math.random() * 300);
            m.hp = Math.max(0, m.hp - dmg);
            showDmgPopup(dmg, document.getElementById(m.id), '#ff3333');
        });
        renderStatus();
    }

    function triggerItem() {
        party[0].hp = Math.min(party[0].maxHp, party[0].hp + 1000);
        renderStatus();
    }

    function showDmgPopup(val, element, color) {
        if(!element) return;
        const d = document.createElement('div');
        d.className = 'dmg-popup';
        d.innerText = val;
        d.style.color = color || '#ffffff';
        d.style.left = (element.offsetLeft + 20) + "px";
        d.style.top = (element.offsetTop - 20) + "px";
        document.getElementById('game-arena').appendChild(d);
        setTimeout(() => d.remove(), 700);
    }

    function startAutoEnemyATB() {
        setInterval(() => {
            // Inimigo ataca aleatoriamente um membro da equipe
            let liveMonsters = monsters.filter(m => m.hp > 0);
            if(liveMonsters.length === 0) {
                // Ressuscita para gameplay infinito
                monsters.forEach(m => m.hp = m.maxHp);
                return;
            }
            
            let randomHero = party[Math.floor(Math.random() * party.length)];
            let dmg = Math.floor(100 + Math.random() * 150);
            randomHero.hp = Math.max(0, randomHero.hp - dmg);
            
            // Renderiza Dano Vermelho na Equipe
            const heroId = randomHero.name === party[0].name ? 'player' : (randomHero.name === 'SNOW' ? 'ally1' : 'ally2');
            showDmgPopup(dmg, document.getElementById(heroId), '#ff4757');
            
            renderStatus();
        }, 2500);
    }
</script>
</body>
</html>
