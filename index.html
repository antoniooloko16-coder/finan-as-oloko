<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Direto ao Ponto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2d2d2d;
            --primary: #bb86fc;
            --success: #00C853;
            --danger: #D50000;
            --accent: #2962FF;
            --text: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text);
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding-bottom: 20px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid #2d2d2d;
        }

        .top-bar h2 {
            font-size: 18px;
            margin: 0;
            color: var(--primary);
        }

        .top-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .month-select {
            background: var(--bg-input);
            color: var(--text);
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Panels */
        .card {
            background: var(--bg-card);
            margin: 15px 15px 0 15px;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Quick Entry Panel */
        .display-amount {
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0 20px 0;
            color: var(--text);
            letter-spacing: 1px;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .key {
            background: var(--bg-input);
            border: none;
            color: var(--text);
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .key:active {
            background: #444;
        }

        /* Metadata Panel */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .text-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text);
            box-sizing: border-box;
            font-size: 16px;
        }

        .tags-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tag {
            background: #2d2d2d;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .conditional-box {
            background: #181818;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border-left: 3px solid var(--primary);
        }

        /* Action Buttons */
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px;
        }

        .btn-action {
            border: none;
            padding: 15px 5px;
            font-weight: bold;
            border-radius: 10px;
            color: #000;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
        }

        /* Summary Widget */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
            margin-top: 10px;
        }

        .metric-box h4 { margin: 0 0 5px 0; font-size: 12px; color: var(--text-muted); }
        .metric-box p { margin: 0; font-size: 15px; font-weight: bold; }

        @keyframes blink {
            0% { border: 1px solid var(--danger); }
            50% { border: 1px solid transparent; }
            100% { border: 1px solid var(--danger); }
        }

        .alert-blink {
            animation: blink 1s infinite;
            background: rgba(213, 0, 0, 0.1);
            border-radius: 8px;
            padding: 5px;
        }

        /* History List */
        .history-list {
            margin-top: 15px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2d2d2d;
        }

        .history-info { display: flex; flex-direction: column; }
        .history-desc { font-weight: 500; font-size: 15px; }
        .history-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .history-val { font-weight: bold; font-size: 15px; }

        /* Modal Layout */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
            padding: 20px;
        }

        .modal-content {
            background: var(--bg-card);
            width: 100%;
            max-width: 360px;
            padding: 25px;
            border-radius: 16px;
            box-sizing: border-box;
        }

        .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: var(--primary); }

        .modal-btn {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
        }

        .success-banner {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: #000;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            z-index: 2000;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="success-banner" id="successBanner">Lançamento Salvo! ✓</div>

    <div class="app-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <h2>Finanças Direto ao Ponto</h2>
            <div class="top-actions">
                <button class="icon-btn" onclick="togglePrivacyMode()">👁️</button>
                <select class="month-select" id="monthSelector" onchange="loadData()">
                    <option value="06-2026">Jun 2026</option>
                    <option value="07-2026">Jul 2026</option>
                </select>
            </div>
        </div>

        <!-- Quick Entry Panel -->
        <div class="card">
            <div class="display-amount" id="amountDisplay">R$ 0,00</div>
            <div class="keyboard-grid">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key" onclick="pressKey('C')" style="color:var(--danger)">C</button>
                <button class="key" onclick="pressKey('0')">0</button>
                <button class="key" onclick="pressKey('back')">⌫</button>
            </div>
        </div>

        <!-- Metadata Panel -->
        <div class="card">
            <div class="input-group">
                <label for="tx_description">Descrição</label>
                <input type="text" id="tx_description" class="text-input" placeholder="Ex: Supermercado">
                <div class="tags-container">
                    <div class="tag" onclick="fillDescription('Supermercado')">🛒 Supermercado</div>
