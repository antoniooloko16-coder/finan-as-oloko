<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Retro Idle RPG - PRO Edition</title>
    <style>
        /* ESTILO BASE RETRO */
        body { background-color: #0b0b10; color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        #game-container { width: 640px; background-color: #1c1c24; border: 6px double #fff; padding: 15px; box-shadow: 0 0 25px #000; image-rendering: pixelated; }
        .hidden { display: none !important; }

        /* CANVAS E PARALLAX */
        #stage-canvas {
            width: 100%; height: 260px;
            background: linear-gradient(to bottom, #4a90e2 0%, #a3d2ff 60%, #edce82 60%, #edce82 62%, #3a913f 62%, #2d6a30 100%);
            border: 3px solid #fff; position: relative; overflow: hidden;
        }
        .mountain-back { position: absolute; bottom: 100px; width: 220px; height: 90px; background: #2d6a30; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); opacity: 0.5; }

        /* ANATOMIA DO PERSONAGEM (HUMANOIDE) */
        #player-anchor {
            width: 50px; height: 80px; position: absolute; bottom: 40px; left: 120px;
            display: flex; justify-content: center; transition: 0.1s;
        }
        .p-head { width: 24px; height: 24px; background: #ffcc99; position: absolute; top: 0; border-radius: 4px; z-index: 5; }
        .p-body { width: 26px; height: 32px; background: #34495e; position: absolute; top: 24px; border-radius: 2px; z-index: 4; }
        .p-arm { width: 8px; height: 22px; background: #ffcc99; position: absolute; top: 26px; transform-origin: top; z-index: 6; border: 1px solid #000; }
        .arm-l { left: -6px; }
        .arm-r { right: -6px; }
        .p-leg { width: 10px; height: 24px; background: #2c3e50; position: absolute; bottom: 0; border-radius: 2px; }
        .leg-l { left: 4px; }
        .leg-r { right: 4px; }
        .p-weapon-hand { position: absolute; bottom: -15px; width: 12px; height: 45px; transform-origin: top center; transition: 0.2s; }

        /* ANIMAÇÕES */
        .anim-idle { animation: idleBreath 1.5s infinite ease-in-out; }
        @keyframes idleBreath { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        
        .attack-swing { animation: swing 0.3s ease-in-out; }
        @keyframes swing { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg) translateX(10px); } 100% { transform: rotate(0deg); } }

        /* MONSTRO */
        #monster-anchor { width: 60px; height: 60px; position: absolute; bottom: 40px; right: -80px; transition: 0.1s; }
        .m-body { width: 100%; height: 100%; background: #c0392b; border-radius: 10px; position: relative; border: 3px solid #000; }
        .m-eye { position: absolute; width: 8px; height: 8px; background: #fff; top: 15px; left: 10px; box-shadow: 25px 0 #fff; }

        /* DANO FLUTUANTE */
        .dmg-popup { position: absolute; color: #ff4757; font-weight: bold; font-size: 20px; text-shadow: 2px 2px #000; animation: floatUp 0.6s forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }

        /* UI */
        .game-ui { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .panel { border: 3px solid #fff; padding: 12px; background: #0f0f14; height: 250px; overflow-y: auto; }
        .item-slot { background: #1c1c24; border: 2px solid #3a3a4a; padding: 6px; margin: 4px 0; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .equipped { border-color: #f1c40f; background: #2c2c10; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        .progress-container { background: #333; height: 12px; border: 2px solid #fff; margin-bottom: 10px; }
        .progress-bar { background: #e74c3c; height: 100%; width: 100%; transition: 0.1s; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- MENU INICIAL -->
    <div id="creation-screen" class="menu-screen">
        <h2 style="text-align:center">RPG ENGENHARIA DE SOLUÇÕES</h2>
        <div style="margin: 20px 0; text-align:center">
            <input type="text" id="char-name" value="Herói" placeholder="Nome">
            <select id="char-class">
                <option value="Guerreiro">Guerreiro (FOR)</option>
                <option value="Mago">Mago (INT)</option>
                <option value="Arqueiro">Arqueiro (AGI)</option>
            </select>
            <button onclick="startGame()" style="padding: 10px 20px; cursor:pointer">INICIAR</button>
        </div>
    </div>

    <!-- TELA DE JOGO -->
    <div id="game-screen" class="hidden">
        <div class="top-bar">
            <span id="ui-name-lvl">Nível 1</span>
            <span id="ui-stage" style="color:#f1c40f">Mundo 1</span>
        </div>
        
        <div class="progress-container"><div id="enemy-hp-bar" class="progress-bar"></div></div>

        <div id="stage-canvas">
            <div id="parallax-container">
                <div class="mountain-back" style="left: 100px;"></div>
                <div class="mountain-back" style="left: 400px;"></div>
            </div>

            <!-- HERÓI MODULAR -->
            <div id="player-anchor" class="anim-idle">
                <div id="v-head" class="p-head"><div class="p-eyes"></div></div>
                <div id="v-suit" class="p-body"></div>
                <div class="p-arm arm-l"></div>
                <div class="p-arm arm-r" id="v-arm-main">
                    <div id="v-weapon" class="p-weapon-hand"></div>
                </div>
                <div id="v-leg-l" class="p-leg leg-l"></div>
                <div id="v-leg-r" class="p-leg leg-r"></div>
            </div>

            <!-- MONSTRO -->
            <div id="monster-anchor">
                <div class="m-body" id="v-monster-body">
                    <div class="m-eye"></div>
                </div>
            </div>
        </div>

        <div class="game-ui">
            <div class="panel">
                <h3>Atributos</h3>
                <div id="stats-display"></div>
            </div>
            <div class="panel">
                <h3>Inventário (Top 3)</h3>
                <div id="loot-display"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let player = {
        name: "", class: "", lvl: 1, exp: 0, expNeeded: 100,
        hp: 100, maxHp: 100, str: 10, int: 10, agi: 10, def: 5, luk: 5,
        // Inventário Inteligente: Armazena arrays de até 3 itens
        inventory: { weapon: [], helmet: [], suit: [], boots: [], ring: [] }
    };

    let currentStage = 1;
    let monstersKilled = 0;
    let monster = null;
    let isAttacking = false;

    function startGame() {
        player.name = document.getElementById("char-name").value;
        player.class = document.getElementById("char-class").value;
        
        // Bonus Inicial por Classe
        if(player.class === "Guerreiro") player.str += 10;
        if(player.class === "Mago") player.int += 10;
        if(player.class === "Arqueiro") player.agi += 10;

        document.getElementById("creation-screen").className = "hidden";
        document.getElementById("game-screen").className = "";
        
        spawnMonster();
        requestAnimationFrame(gameLoop);
    }

    function spawnMonster() {
        let isBoss = (monstersKilled >= 10);
        let difficulty = currentStage * (isBoss ? 5 : 1);
        monster = {
            isBoss: isBoss,
            hp: 30 * difficulty,
            maxHp: 30 * difficulty,
            atk: 5 * difficulty,
            pos: 650
        };
        document.getElementById("monster-anchor").style.right = "-80px";
    }

    function createDmgPopup(amount, x, y) {
        const popup = document.createElement("div");
        popup.className = "dmg-popup";
        popup.innerText = amount;
        popup.style.left = x + "px";
        popup.style.top = y + "px";
        document.getElementById("stage-canvas").appendChild(popup);
        setTimeout(() => popup.remove(), 600);
    }

    function performAttack() {
        if(isAttacking) return;
        isAttacking = true;

        // Animação do Braço
        const arm = document.getElementById("v-arm-main");
        arm.classList.add("attack-swing");

        // Cálculo de Dano Dinâmico
        let attrBase = player.class === "Guerreiro" ? player.str : (player.class === "Mago" ? player.int : player.agi);
        let dmg = Math.floor(attrBase * (0.8 + Math.random() * 0.4));
        
        // Aplicar no Monstro
        monster.hp -= dmg;
        createDmgPopup(dmg, 450, 100);

        setTimeout(() => {
            arm.classList.remove("attack-swing");
            isAttacking = false;
            if(monster.hp <= 0) processVictory();
        }, 300);
    }

    function processVictory() {
        monstersKilled++;
        player.exp += 20 * currentStage;
        
        // DROP DE ITEM
        generateSmartLoot();

        if(player.exp >= player.expNeeded) {
            player.lvl++;
            player.exp = 0;
            player.expNeeded *= 1.5;
            player.maxHp += 20;
            player.hp = player.maxHp;
            player.str += 2; player.int += 2; player.agi += 2;
        }

        if(monstersKilled > 10) {
            currentStage++;
            monstersKilled = 0;
        }
        spawnMonster();
    }

    function generateSmartLoot() {
        const types = ["weapon", "helmet", "suit", "boots", "ring"];
        const type = types[Math.floor(Math.random() * types.length)];
        const power = Math.floor(currentStage * 2 + Math.random() * 5);
        
        let newItem = {
            id: Date.now(),
            name: `${type.toUpperCase()} +${power}`,
            type: type,
            power: power
        };

        // Lógica TOP 3
        let slot = player.inventory[type];
        slot.push(newItem);
        slot.sort((a, b) => b.power - a.power); // Ordena do mais forte pro mais fraco

        if(slot.length > 3) {
            slot.pop(); // Descarta o 4º item (o mais fraco)
        }

        updateInventoryUI();
        updateVisuals();
    }

    function updateInventoryUI() {
        let html = "";
        for(let type in player.inventory) {
            player.inventory[type].forEach((item, index) => {
                let isEquipped = index === 0;
                html += `<div class="item-slot ${isEquipped ? 'equipped' : ''}">
                    <span>${item.name}</span>
                    <span>${isEquipped ? '[EQUIPADO]' : ''}</span>
                </div>`;
            });
        }
        document.getElementById("loot-display").innerHTML = html;
    }

    function updateVisuals() {
        // Atualiza cores baseadas nos itens equipados (index 0 de cada slot)
        const weapon = player.inventory.weapon[0];
        if(weapon) {
            document.getElementById("v-weapon").style.backgroundColor = "#f1c40f";
            document.getElementById("v-weapon").style.boxShadow = "0 0 5px #fff";
        }
        const suit = player.inventory.suit[0];
        if(suit) {
            document.getElementById("v-suit").style.backgroundColor = "#e67e22";
        }
    }

    function gameLoop() {
        // Movimento do Monstro
        let mAnchor = document.getElementById("monster-anchor");
        let currentRight = parseInt(mAnchor.style.right);
        
        if(currentRight < 120) {
            mAnchor.style.right = (currentRight + 2) + "px";
        } else {
            performAttack();
        }

        // Atualização de UI
        document.getElementById("enemy-hp-bar").style.width = (monster.hp / monster.maxHp * 100) + "%";
        document.getElementById("ui-name-lvl").innerText = `${player.name} Lvl.${player.lvl} (${player.class})`;
        document.getElementById("ui-stage").innerText = `Mundo ${currentStage} - Progresso: ${monstersKilled}/10`;
        
        // Soma atributos dos itens equipados (os primeiros de cada lista)
        let bonusStr = player.inventory.weapon[0] ? player.inventory.weapon[0].power : 0;
        let bonusDef = player.inventory.suit[0] ? player.inventory.suit[0].power : 0;

        document.getElementById("stats-display").innerHTML = `
            FOR: ${player.str} (+${bonusStr})<br>
            INT: ${player.int}<br>
            AGI: ${player.agi}<br>
            DEF: ${player.def} (+${bonusDef})<br>
            HP: ${Math.floor(player.hp)}/${player.maxHp}
        `;

        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
