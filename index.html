<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADOW LEGENDS: INFINITE</title>
    <style>
        :root {
            --raro: #ffcc00; --comum: #a4b0be; --bg: #09090e;
            --panel: linear-gradient(180deg, #1c2237 0%, #0d111b 100%); 
            --accent: #ff4757;
            --hp-player: linear-gradient(90deg, #10ac84, #1dd1a1);
            --hp-monster: linear-gradient(90deg, #ff4757, #ff6b6b);
            --border-ui: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: #f1f2f6; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }

        /* --- DESIGN GRÁFICO ESTILO RPG CLÁSSICO --- */
        #game-arena {
            position: relative; width: 100%; height: 50vh;
            /* Cenário Orgânico Avançado (Céu, Montanhas e Gramado em Gradientes e Formas) */
            background: 
                /* Chão / Gramado inferior */
                linear-gradient(to top, #2f3e23 0%, #57753c 25%, transparent 25%),
                /* Linha de transição da grama */
                linear-gradient(to top, #486331 25%, #7aa852 27%, transparent 27%),
                /* Silhueta de Montanhas Distantes */
                radial-gradient(circle at 30% 85%, #2d3c4d 0%, #1e2736 60%, transparent 60%),
                radial-gradient(circle at 75% 90%, #253342 0%, #171f2b 55%, transparent 55%),
                /* Céu com nuvens suaves */
                linear-gradient(to bottom, #4a76a8 0%, #7097c2 40%, #b0c9e8 75%, #dce8f5 100%);
            border-bottom: 4px solid #141923; overflow: hidden;
            box-shadow: inset 0 -30px 40px rgba(0,0,0,0.4);
        }

        .floor { 
            position: absolute; bottom: 0; width: 100%; height: 15%; 
            background: linear-gradient(180deg, #486130 0%, #29381b 100%);
            box-shadow: inset 0 10px 15px rgba(0,0,0,0.5);
        }

        /* PERSONAGEM DETALHADO E SUAVE (SEM CANTOS QUADRADOS) */
        #player { 
            position: absolute; bottom: 10%; left: 60px; width: 55px; height: 85px; 
            z-index: 10; transition: left 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.6));
        }
        .p-sprite { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .p-head { width: 32px; height: 32px; background: var(--skin); border-radius: 50% 50% 40% 40%; position: relative; border: 2px solid #000; box-shadow: inset -3px -3px 0 rgba(0,0,0,0.15); }
        .p-hair { position: absolute; top: -6px; width: 114%; left: -7%; height: 22px; background: var(--hair); border-radius: 12px 12px 6px 6px; }
        .p-body { width: 38px; height: 42px; background: var(--armor); border-radius: 14px 14px 8px 8px; border: 2px solid #000; position: relative; margin-top: -2px; box-shadow: inset -4px -4px 0 rgba(0,0,0,0.2); }
        .p-arm { width: 14px; height: 32px; background: var(--skin); position: absolute; top: 6px; right: -8px; transform-origin: top center; border: 2px solid #000; z-index: 5; border-radius: 10px; box-shadow: inset -2px -2px 0 rgba(0,0,0,0.1); }
        .p-weapon { position: absolute; bottom: -18px; width: 8px; height: 46px; background: #f1f2f6; border: 2px solid #000; transform-origin: top center; border-radius: 4px 4px 0 0; box-shadow: 0 0 8px rgba(255,255,255,0.4); }

        /* MONSTRO ESTILIZADO (FORMA ORGÂNICA DE Sombra) */
        #monster { position: absolute; bottom: 10%; right: 60px; width: 85px; height: 95px; z-index: 5; transition: transform 0.1s; filter: drop-shadow(0 8px 6px rgba(0,0,0,0.6)); }
        .m-body { 
            width: 100%; height: 100%; background: #2f3542; border: 3px solid #000; 
            border-radius: 45% 45% 35% 35%; position: relative; overflow: hidden;
            box-shadow: inset -8px -8px 0 rgba(0,0,0,0.3), 0 0 20px rgba(0,0,0,0.2);
        }
        .m-eye { position: absolute; top: 25px; left: 20px; width: 14px; height: 8px; background: #ff4757; border-radius: 50%; box-shadow: 0 0 12px #ff4757; transform: rotate(-10deg); }

        /* --- UI PREMIUM ESTILO SUPREME RPG --- */
        .ui-header { padding: 12px 20px; background: rgba(13, 17, 27, 0.85); backdrop-filter: blur(12px); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-ui); }
        .stage-title { color: var(--raro); font-weight: bold; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }

        /* Barras de Vida Arredondadas */
        .hp-hud-container { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .hp-row { display: flex; align-items: center; gap: 10px; }
        .hp-label { font-size: 11px; font-weight: bold; width: 45px; text-shadow: 1px 1px #000; }
        .hp-container { flex: 1; height: 14px; background: #141923; border-radius: 20px; overflow: hidden; border: 2px solid #2f3542; box-shadow: inset 0 2px 4px rgba(0,0,0,0.6); }
        .hp-fill { height: 100%; border-radius: 20px; transition: width 0.2s ease; box-shadow: inset 0 2px 2px rgba(255,255,255,0.3); }

        /* Dashboard de Informações com Bordas Arredondadas Suaves */
        .dashboard { flex: 1; background: var(--panel); padding: 15px; display: flex; flex-direction: column; gap: 12px; border-top: 3px solid #232b42; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 12px; text-align: center; border: 1px solid var(--border-ui); box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .stat-val { display: block; font-size: 16px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 10px; color: #a4b0be; text-transform: uppercase; letter-spacing: 1px; }

        /* Lista de Inventário Fluida */
        .inventory-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 2px; }
        .item-card { 
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-ui); border-radius: 14px; 
            padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s; border-left: 5px solid var(--comum);
        }
        .item-card.rare { border-left-color: var(--raro); background: linear-gradient(90deg, rgba(255,204,0,0.05) 0%, rgba(0,0,0,0) 100%); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .equipped-badge { background: #1dd1a1; color: #000; font-size: 9px; padding: 3px 8px; border-radius: 20px; font-weight: bold; letter-spacing: 0.5px; }

        /* --- COMBATE FEEDBACK --- */
        .dmg-popup { 
            position: absolute; font-size: 28px; font-weight: 900; pointer-events: none;
            animation: dmgAnim 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; 
            text-shadow: 3px 3px 0px #000; z-index: 100; font-family: 'Impact', Arial Black, sans-serif;
        }
        @keyframes dmgAnim {
            0% { transform: translateY(0) scale(0.4); opacity: 0; }
            20% { opacity: 1; transform: scale(1.3); }
            50% { transform: translateY(-40px) scale(1); }
            100% { transform: translateY(-80px) scale(0.9); opacity: 0; }
        }
        
        .shake { animation: shake 0.15s ease-in-out infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px) translateY(2px); } 75% { transform: translateX(6px) translateY(-2px); } }

        /* MODAL INICIAL (TELA DE CRIAÇÃO ESTILIZADA) */
        .modal { position: fixed; inset: 0; background: linear-gradient(135deg, #131924 0%, #080b11 100%); z-index: 1000; padding: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .class-select { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .class-btn { background: rgba(255,255,255,0.03); border: 2px solid var(--border-ui); color: #fff; padding: 12px; border-radius: 16px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .class-btn.active { border-color: var(--raro); background: rgba(255, 204, 0, 0.15); box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); color: var(--raro); }
        .start-btn { background: linear-gradient(135deg, #ff4757 0%, #ff6b6b 100%); color: white; border: none; padding: 16px 45px; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 8px 20px rgba(255,71,87,0.4); transition: 0.2s; }
        .start-btn:active { transform: scale(0.96); }

        .projectile {
            position: absolute; width: 35px; height: 10px; background: linear-gradient(90deg, #fff, #00c6ff); border-radius: 20px;
            box-shadow: 0 0 20px #00c6ff; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="screen-setup" class="modal">
        <h1 style="color:var(--raro); letter-spacing: 4px; font-size: 28px; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">SHADOW LEGENDS</h1>
        <p style="color:#a4b0be; font-size: 12px; margin-top: 0; margin-bottom: 20px;">CRIE SEU HERÓI PARA A JORNADA</p>
        <input type="text" id="p-name" placeholder="NOME DO HERÓI" style="width:100%; max-width: 320px; padding:14px; background:rgba(0,0,0,0.4); border:2px solid var(--border-ui); color:white; border-radius:16px; text-align: center; font-weight: bold;">
        
        <div class="class-select" id="class-list" style="max-width: 320px;">
            <button class="class-btn active" onclick="selClass('Guerreiro')">GUERREIRO</button>
            <button class="class-btn" onclick="selClass('Arqueiro')">ARQUEIRO</button>
            <button class="class-btn" onclick="selClass('Mago')">MAGO</button>
            <button class="class-btn" onclick="selClass('Assassino')">ASSASSINO</button>
            <button class="class-btn" onclick="selClass('Paladino')">PALADINO</button>
            <button class="class-btn" onclick="selClass('Druida')">DRUIDA</button>
        </div>

        <div style="display:flex; gap:30px; margin-bottom:25px; background: rgba(0,0,0,0.2); padding: 12px 25px; border-radius: 16px; border: 1px solid var(--border-ui);">
            <div style="text-align:center">
                <span style="font-size:10px; color:#a4b0be; font-weight: bold;">PELE</span><br>
                <input type="color" id="p-skin" value="#ffdbac" onchange="updateVisual()" style="border:none; width:35px; height:35px; background:transparent; cursor:pointer;">
            </div>
            <div style="text-align:center">
                <span style="font-size:10px; color:#a4b0be; font-weight: bold;">CABELO</span><br>
                <input type="color" id="p-hair" value="#4b3621" onchange="updateVisual()" style="border:none; width:35px; height:35px; background:transparent; cursor:pointer;">
            </div>
        </div>

        <button class="start-btn" onclick="startGame()">INICIAR MISSÃO</button>
    </div>

    <div id="game-main" style="display:none; height: 100%;">
        <div class="ui-header">
            <div>
                <span class="stage-title" id="stage-info">FASE 1-1</span><br>
                <small id="kills-info" style="color:#a4b0be; font-weight: 500;">MONSTROS: 0/10</small>
            </div>
            <div style="text-align:right">
                <span style="color:#1dd1a1; font-weight: bold;">LVL <span id="p-lvl">1</span></span><br>
                <small id="p-class-ui" style="color:#a4b0be; text-transform: uppercase; font-size: 10px; letter-spacing: 1px;">GUERREIRO</small>
            </div>
        </div>

        <div id="game-arena">
            <!-- Camada de Fundo Dinâmica Interna -->
            <div class="floor"></div>
            
            <div id="player">
                <div class="p-sprite">
                    <div class="p-head"><div class="p-hair"></div></div>
                    <div class="p-body">
                        <div class="p-arm" id="main-arm"><div class="p-weapon" id="weapon-visual"></div></div>
                    </div>
                </div>
            </div>
            
            <div id="monster">
                <div class="m-body" id="m-body-color">
                    <div class="m-eye"></div>
                </div>
            </div>

            <!-- Painel Superior com Barras de Vida Integradas e Limpas (Estilo Menu RPG) -->
            <div style="position:absolute; top:15px; width:90%; left:5%; background: rgba(13, 17, 27, 0.75); padding: 10px; border-radius: 14px; backdrop-filter: blur(8px); border: 1px solid var(--border-ui);">
                <div class="hp-hud-container">
                    <div class="hp-row">
                        <span class="hp-label" style="color:#ff6b6b">INIMIGO</span>
                        <div class="hp-container"><div id="m-hp-bar" class="hp-fill" style="width:100%; background: var(--hp-monster)"></div></div>
                    </div>
                    <div class="hp-row">
                        <span class="hp-label" style="color:#1dd1a1">HERÓI</span>
                        <div class="hp-container"><div id="p-hp-bar" class="hp-fill" style="width:100%; background: var(--hp-player)"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard">
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-val" id="st-str">0</span><span class="stat-label">FOR</span></div>
                <div class="stat-box"><span class="stat-val" id="st-def">0</span><span class="stat-label">DEF</span></div>
                <div class="stat-box"><span class="stat-val" id="st-luk">0</span><span class="stat-label">SOR</span></div>
                <div class="stat-box"><span class="stat-val" id="st-agi">0</span><span class="stat-label">AGI</span></div>
                <div class="stat-box"><span class="stat-val" id="st-eva">0</span><span class="stat-label">ESQ</span></div>
                <div class="stat-box"><span class="stat-val" id="st-int">0</span><span class="stat-label">INT</span></div>
            </div>

            <div class="inventory-list" id="inv-ui">
                <!-- Itens Gerados Dinamicamente -->
            </div>
        </div>
    </div>

<script>
    let player = {
        name: "", class: "Guerreiro", lvl: 1, 
        hp: 100, maxHp: 100,
        str: 5, def: 5, luk: 5, agi: 5, eva: 5, int: 5,
        equipped: { weapon: null, head: null, torso: null, feet: null, ring: null },
        inventory: []
    };

    let game = { stage: 1, kills: 0, isAttacking: false, monster: null };

    // Tabela de paletas de cores para as classes (Armadura/Roupas)
    const classColors = {
        'Guerreiro': '#57606f', 'Arqueiro': '#2ed573', 'Mago': '#574b90',
        'Assassino': '#2f3542', 'Paladino': '#f1f2f6', 'Druida': '#10ac84'
    };

    function selClass(c) {
        player.class = c;
        document.querySelectorAll('.class-btn').forEach(b => {
            b.classList.remove('active');
            if(b.innerText === c.toUpperCase()) b.classList.add('active');
        });
        updateVisual();
    }

    function updateVisual() {
        document.documentElement.style.setProperty('--skin', document.getElementById('p-skin').value);
        document.documentElement.style.setProperty('--hair', document.getElementById('p-hair').value);
        
        // Customização dinâmica da cor da armadura com base na classe selecionada
        document.documentElement.style.setProperty('--armor', classColors[player.class] || '#57606f');
        
        const w = document.getElementById('weapon-visual');
        if(player.class === 'Guerreiro' || player.class === 'Paladino') {
            w.style.width = '10px';
            w.style.backgroundColor = '#d1d8e0';
        } else if(player.class === 'Assassino') {
            w.style.width = '5px';
            w.style.backgroundColor = '#747d8c';
        } else if(player.class === 'Mago' || player.class === 'Druida') {
            w.style.width = '6px';
            w.style.backgroundColor = '#ffa502'; // Cajado dourado
        } else {
            w.style.backgroundColor = 'transparent';
        }
    }

    function startGame() {
        player.name = document.getElementById('p-name').value || "HERÓI";
        const c = player.class;
        if(c === "Guerreiro") { player.str += 10; player.def += 5; player.range = "melee"; }
        if(c === "Arqueiro") { player.agi += 10; player.luk += 5; player.range = "ranged"; }
        if(c === "Mago") { player.int += 10; player.luk += 5; player.range = "magic"; }
        if(c === "Assassino") { player.agi += 10; player.eva += 10; player.range = "melee"; }
        if(c === "Paladino") { player.def += 12; player.str += 3; player.range = "melee"; }
        if(c === "Druida") { player.int += 5; player.def += 5; player.range = "magic"; }

        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('game-main').style.display = 'flex';
        document.getElementById('p-class-ui').innerText = player.class;
        
        updateVisual();
        spawnMonster();
        engine();
    }

    function spawnMonster() {
        const isBoss = (game.kills >= 10);
        game.monster = {
            isBoss: isBoss,
            maxHp: (50 + (game.stage * 30)) * (isBoss ? 5 : 1),
            hp: (50 + (game.stage * 30)) * (isBoss ? 5 : 1),
            atk: 5 + (game.stage * 2),
            def: 2 + (game.stage * 1)
        };
        
        const mBody = document.getElementById('m-body-color');
        mBody.style.background = isBoss ? 'linear-gradient(135deg, #3c1361 0%, #512da8 100%)' : 'linear-gradient(135deg, #2c3e50 0%, #0f171e 100%)';
        if(isBoss) mBody.style.boxShadow = "0 0 35px rgba(104, 58, 183, 0.6), inset -8px -8px 0 rgba(0,0,0,0.4)";
        else mBody.style.boxShadow = "inset -8px -8px 0 rgba(0,0,0,0.3)";
        
        updateUI();
    }

    function engine() {
        if(!game.isAttacking) combatCycle();
        requestAnimationFrame(engine);
    }

    function combatCycle() {
        game.isAttacking = true;
        const stats = calcStats();
        const pEl = document.getElementById('player');
        const arm = document.getElementById('main-arm');

        if(player.range === "melee") {
            pEl.style.left = (window.innerWidth - 180) + "px";
            setTimeout(() => { 
                arm.style.transform = "rotate(-90deg)";
                applyDamage(stats); 
            }, 180);
        } else {
            arm.style.transform = "rotate(-45deg)";
            createProjectile(player.range, stats);
        }

        setTimeout(() => {
            pEl.style.left = "60px";
            arm.style.transform = "rotate(0deg)";
            
            if(game.monster.hp > 0) {
                setTimeout(() => {
                    if(Math.random() * 100 > stats.eva) {
                        let mDmg = Math.max(1, game.monster.atk - (stats.def / 2));
                        player.hp -= mDmg;
                        showDmg(Math.floor(mDmg), 'player');
                        document.getElementById('game-arena').classList.add('shake');
                        setTimeout(()=>document.getElementById('game-arena').classList.remove('shake'), 150);
                    } else {
                        showDmg("MISS", 'player', true);
                    }
                    checkGameState(stats);
                }, 250);
            } else {
                checkGameState(stats);
            }
            
            let speed = Math.max(400, 1400 - (stats.agi * 10));
            setTimeout(() => { game.isAttacking = false; }, speed);
        }, 450);
    }

    function createProjectile(type, stats) {
        const proj = document.createElement('div');
        proj.className = 'projectile';
        proj.style.left = "110px";
        proj.style.bottom = "15%";
        if(type === 'magic') proj.style.background = "linear-gradient(90deg, #fff, #a29bfe)";
        if(type === 'magic') proj.style.boxShadow = "0 0 20px #a29bfe";
        document.getElementById('game-arena').appendChild(proj);

        let pos = 110;
        let id = setInterval(() => {
            pos += 18;
            proj.style.left = pos + "px";
            if(pos >= window.innerWidth - 160) {
                clearInterval(id);
                proj.remove();
                applyDamage(stats);
            }
        }, 16);
    }

    function applyDamage(stats) {
        let crit = Math.random() * 100 < stats.luk;
        let dmg = Math.max(1, (stats.str + stats.int) - (game.monster.def / 2));
        if(crit) dmg *= 2;
        
        game.monster.hp -= dmg;
        showDmg(Math.floor(dmg), 'monster', crit);
        updateUI();
    }

    function checkGameState(stats) {
        if(player.hp <= 0) {
            game.stage = Math.max(1, game.stage - 1);
            game.kills = 0;
            player.hp = stats.maxHp;
            spawnMonster();
        } else if(game.monster.hp <= 0) {
            if(game.monster.isBoss) {
                game.stage++;
                game.kills = 0;
                createLoot();
                player.lvl++;
                player.hp = stats.maxHp;
            } else {
                game.kills++;
            }
            spawnMonster();
        }
        updateUI();
    }

    function createLoot() {
        const slots = ['Espada', 'Elmo', 'Armadura', 'Botas', 'Anel'];
        const stats = ['str', 'def', 'luk', 'agi', 'eva', 'int'];
        const isRare = Math.random() < 0.25; // Aumentado chance para melhor engajamento visual

        const item = {
            id: Date.now(),
            slot: slots[Math.floor(Math.random() * slots.length)],
            mainStat: stats[Math.floor(Math.random() * stats.length)],
            val: Math.floor(game.stage * (isRare ? 12 : 3) + Math.random() * 5),
            rare: isRare
        };

        player.inventory.unshift(item);
        if(player.inventory.length > 8) player.inventory.pop();

        if(!player.equipped[item.slot] || item.val > player.equipped[item.slot].val) {
            player.equipped[item.slot] = item;
        }
        updateUI();
    }

    function calcStats() {
        let s = {...player};
        Object.values(player.equipped).forEach(i => {
            if(i) s[i.mainStat] += i.val;
        });
        s.maxHp = 100 + (player.lvl * 20) + (s.def * 5);
        return s;
    }

    function showDmg(val, target, special) {
        const d = document.createElement('div');
        d.className = 'dmg-popup';
        d.innerText = val;
        d.style.color = special ? 'var(--raro)' : (target === 'player' ? '#ff4757' : '#ffffff');
        if(special && target !== 'player') {
            d.style.fontSize = '38px';
            d.innerText = "CRIT! " + val;
        }
        d.style.left = (target === 'player' ? '90px' : (window.innerWidth - 150) + 'px');
        d.style.bottom = '22%';
        document.getElementById('game-arena').appendChild(d);
        setTimeout(() => d.remove(), 700);
    }

    function updateUI() {
        const stats = calcStats();
        document.getElementById('p-lvl').innerText = player.lvl;
        document.getElementById('stage-info').innerText = `FASE ${Math.floor(game.stage/5) + 1}-${(game.stage%5) || 5}`;
        document.getElementById('kills-info').innerText = game.monster.isBoss ? "CHEFE DA ÁREA!" : `MONSTROS: ${game.kills}/10`;
        
        document.getElementById('p-hp-bar').style.width = Math.min(100, Math.max(0, (player.hp / stats.maxHp * 100))) + "%";
        document.getElementById('m-hp-bar').style.width = Math.min(100, Math.max(0, (game.monster.hp / game.monster.maxHp * 100))) + "%";

        ['str','def','luk','agi','eva','int'].forEach(s => {
            document.getElementById('st-'+s).innerText = stats[s];
        });

        let invH = "";
        player.inventory.forEach(i => {
            const isEq = player.equipped[i.slot] === i;
            invH += `
                <div class="item-card ${i.rare ? 'rare' : ''}">
                    <div>
                        <strong style="color: ${i.rare ? 'var(--raro)' : '#fff'}">${i.slot.toUpperCase()} Nível ${game.stage}</strong><br>
                        <small style="color: #a4b0be">+${i.val} ${i.mainStat.toUpperCase()}</small>
                    </div>
                    ${isEq ? '<span class="equipped-badge">EQUIPADO</span>' : ''}
                </div>
            `;
        });
        document.getElementById('inv-ui').innerHTML = invH;
    }
</script>
</body>
</html>
