<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHADOW LEGENDS: INFINITE</title>
    <style>
        :root {
            --comum: #a4b0be;
            --uncommon: #2ed573;
            --rare: #00a8ff; 
            --super-rare: #a55eea;
            --diamante: #00ecec; 
            --bg: #05070a;
            --panel: linear-gradient(180deg, #161a26 0%, #0a0d14 100%); 
            --accent: #ff4757;
            --hp-player: linear-gradient(90deg, #10ac84, #1dd1a1);
            --hp-monster: linear-gradient(90deg, #ff4757, #ff6b6b);
            --border-ui: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: #f1f2f6; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
            max-width: 480px; margin: 0 auto; border-left: 1px solid #111; border-right: 1px solid #111;
        }

        #game-arena {
            position: relative; width: 100%; height: 42vh;
            background-image: url('https://latin-salmon-sldip5ie.edgeone.dev/7d095ae81e099c20e7db776ea1a6e2ea.gif'), linear-gradient(to bottom, #111, #222);
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            border-bottom: 4px solid #0d1117; overflow: hidden;
            box-shadow: inset 0 -40px 30px rgba(0,0,0,0.5);
        }

        .floor { 
            position: absolute; bottom: 0; width: 100%; height: 8%; 
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(1px);
        }

        #player { 
            position: absolute; bottom: 6%; left: 30px; width: 75px; height: 75px; 
            z-index: 10; transition: left 0.18s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.5));
            background-image: url('https://visual-aquamarine-74uhjc6d.edgeone.dev/7d4920500a20bf03aa226c3d206999a9.gif');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
        }
        
        .p-sprite { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }
        .p-head { width: 22px; height: 22px; background: var(--skin); border-radius: 50%; position: relative; border: 2px solid #000; }
        .p-hair { position: absolute; top: -5px; width: 110%; left: -5%; height: 14px; background: var(--hair); border-radius: 6px; }
        .p-body { width: 26px; height: 28px; background: var(--armor); border-radius: 8px; border: 2px solid #000; position: relative; margin-top: -2px; }
        .p-arm { width: 10px; height: 22px; background: var(--skin); position: absolute; top: 4px; right: -6px; transform-origin: top center; border: 2px solid #000; z-index: 5; border-radius: 6px; }
        .p-weapon { position: absolute; bottom: -12px; width: 6px; height: 32px; background: #f1f2f6; border: 2px solid #000; transform-origin: top center; border-radius: 3px; }

        #monster { 
            position: absolute; bottom: 6%; right: 30px; width: 75px; height: 75px; z-index: 5; 
            transition: transform 0.1s, width 0.2s, height 0.2s; filter: drop-shadow(0 6px 4px rgba(0,0,0,0.5)); 
            background-size: contain; background-repeat: no-repeat; background-position: bottom center;
        }

        .ui-header { padding: 12px 16px; background: #0d1117; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-ui); }
        .stage-title { color: #ffcc00; font-weight: bold; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .hp-hud-container { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .hp-row { display: flex; align-items: center; gap: 8px; }
        .hp-label { font-size: 10px; font-weight: bold; width: 50px; text-shadow: 1px 1px #000; }
        .hp-container { flex: 1; height: 12px; background: #0b0e14; border-radius: 10px; overflow: hidden; border: 1px solid #232a38; }
        .hp-fill { height: 100%; border-radius: 10px; transition: width 0.2s ease; }

        .dashboard { flex: 1; background: var(--panel); padding: 12px; display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .stat-box { background: rgba(255,255,255,0.02); padding: 6px; border-radius: 10px; text-align: center; border: 1px solid var(--border-ui); }
        .stat-val { display: block; font-size: 13px; font-weight: bold; color: #fff; }
        .stat-label { font-size: 8px; color: #a4b0be; text-transform: uppercase; }

        .dmg-popup { 
            position: absolute; font-size: 26px; font-weight: 900; pointer-events: none;
            animation: dmgAnim 0.65s ease-out forwards; text-shadow: 2px 2px 0px #000; z-index: 100; font-family: 'Impact', sans-serif;
        }
        @keyframes dmgAnim {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            25% { opacity: 1; transform: scale(1.2); }
            100% { transform: translateY(-60px) scale(0.8); opacity: 0; }
        }
        
        .shake { animation: shake 0.15s ease-in-out 1; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 33% { transform: translateX(-8px); } 66% { transform: translateX(8px); } }

        .modal { position: fixed; inset: 0; background: #090c12; z-index: 1000; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; max-width: 480px; margin: 0 auto; }
        .class-select { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 12px 0; }
        .class-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border-ui); color: #fff; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .class-btn.active { border-color: #ffcc00; background: rgba(255, 204, 0, 0.12); color: #ffcc00; }
        .start-btn { background: linear-gradient(135deg, #ff4757 0%, #ff6b6b 100%); color: white; border: none; padding: 14px 40px; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 6px 15px rgba(255,71,87,0.3); }

        .projectile { position: absolute; width: 25px; height: 6px; background: linear-gradient(90deg, #fff, #00c6ff); border-radius: 10px; z-index: 100; }

        .bag-trigger-btn {
            background: linear-gradient(135deg, #2c3e50 0%, #0f171e 100%); border: 1px solid #ffcc00; color: #fff; font-weight: bold; font-size: 12px;
            padding: 10px; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .bag-container { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 8px; width: 100%; height: 75vh; margin-top: 10px; }
        .bag-column { background: rgba(15, 23, 36, 0.6); border: 1px solid var(--border-ui); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .bag-col-header { background: rgba(255,255,255,0.04); padding: 8px; text-align: center; font-size: 12px; font-weight: bold; letter-spacing: 1px; color: #fff; border-bottom: 1px solid var(--border-ui); text-transform: uppercase; }
        .eq-slots-list { padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; height: 100%; }
        .eq-slot-box {
            background: rgba(0,0,0,0.3); border: 1px dashed rgba(255,255,255,0.2); border-radius: 10px; padding: 6px; display: flex; align-items: center; gap: 6px;
            cursor: pointer; min-height: 44px; transition: all 0.2s;
        }
        .eq-slot-box.filled-comum { border: 1px solid var(--comum); background: rgba(164,176,190,0.08); }
        .eq-slot-box.filled-uncommon { border: 1px solid var(--uncommon); background: rgba(46,213,115,0.08); }
        .eq-slot-box.filled-rare { border: 1px solid var(--rare); background: rgba(0,168,255,0.08); }
        .eq-slot-box.filled-super-rare { border: 1px solid var(--super-rare); background: rgba(165,94,234,0.08); }
        .eq-slot-box.filled-diamante { border: 1px solid var(--diamante); background: rgba(0,236,236,0.12); box-shadow: inset 0 0 8px rgba(0,236,236,0.2); }
        
        .eq-slot-icon { font-size: 20px; width: 28px; text-align: center; }
        .eq-slot-info { display: flex; flex-direction: column; }
        .eq-slot-name { font-size: 9px; font-weight: bold; }
        .eq-slot-type { font-size: 8px; color: #a4b0be; text-transform: uppercase; }

        .grid-backpack { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px; overflow-y: auto; align-content: start; height: 100%; }
        .grid-item-slot {
            aspect-ratio: 1; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; position: relative; transition: all 0.15s;
        }
        .grid-item-slot.comum { border: 1px solid var(--comum); background: rgba(164,176,190,0.12); }
        .grid-item-slot.uncommon { border: 1px solid var(--uncommon); background: rgba(46,213,115,0.12); }
        .grid-item-slot.rare { border: 1px solid var(--rare); background: rgba(0,168,255,0.12); }
        .grid-item-slot.super-rare { border: 1px solid var(--super-rare); background: rgba(165,94,234,0.12); }
        .grid-item-slot.diamante { border: 1px solid var(--diamante); background: rgba(0,236,236,0.15); box-shadow: inset 0 0 6px rgba(0,236,236,0.2); }
        .grid-item-slot:active { transform: scale(0.95); }

        .item-details-pop {
            position: absolute; bottom: 0; left: 0; right: 0; background: #0f131c; border-top: 3px solid #ffcc00; padding: 14px; border-top-left-radius: 16px;
            border-top-right-radius: 16px; display: none; flex-direction: column; gap: 8px; box-shadow: 0 -10px 25px rgba(0,0,0,0.8); z-index: 2100;
        }
        
        .reset-save-btn { background: transparent; border: 1px solid #ff4757; color: #ff4757; font-size: 9px; padding: 4px 8px; border-radius: 6px; cursor: pointer; margin-top: 15px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen-setup" class="modal">
        <h1 style="color:#ffcc00; letter-spacing: 2px; font-size: 24px; margin-bottom: 0;">SHADOW LEGENDS</h1>
        <p style="color:#a4b0be; font-size: 11px; margin-bottom: 15px;">MODO RETRATO ACTIVO</p>
        <input type="text" id="p-name" placeholder="NOME DO HERÓI" style="width:100%; padding:12px; background:rgba(0,0,0,0.3); border:1.5px solid var(--border-ui); color:white; border-radius:12px; text-align: center; font-weight: bold;">
        
        <div class="class-select" id="class-list">
            <button class="class-btn active" onclick="selClass('Guerreiro')">GUERREIRO (GIF)</button>
            <button class="class-btn" onclick="selClass('Arqueiro')">ARQUEIRO</button>
            <button class="class-btn" onclick="selClass('Mago')">MAGO</button>
            <button class="class-btn" onclick="selClass('Assassino')">ASSASSINO</button>
            <button class="class-btn" onclick="selClass('Paladino')">PALADINO</button>
            <button class="class-btn" onclick="selClass('Druida')">DRUIDA</button>
        </div>

        <div style="display:flex; gap:20px; margin-bottom:20px; background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 12px; border: 1px solid var(--border-ui);">
            <div style="text-align:center">
                <span style="font-size:9px; color:#a4b0be;">COR PELE</span><br>
                <input type="color" id="p-skin" value="#ffdbac" onchange="updateVisual()" style="border:none; width:30px; height:30px; background:transparent;">
            </div>
            <div style="text-align:center">
                <span style="font-size:9px; color:#a4b0be;">CABELO</span><br>
                <input type="color" id="p-hair" value="#4b3621" onchange="updateVisual()" style="border:none; width:30px; height:30px; background:transparent;">
            </div>
        </div>

        <button class="start-btn" onclick="startGame()">INICIAR MISSÃO</button>
    </div>

    <div id="game-main" style="display:none; height: 100%; flex-direction: column;">
        <div class="ui-header">
            <div>
                <span class="stage-title" id="stage-info">FASE 1-1</span><br>
                <small id="kills-info" style="color:#a4b0be; font-size: 10px;">MONSTROS: 0/10</small>
            </div>
            <div style="text-align:right">
                <span style="color:#1dd1a1; font-weight: bold; font-size: 14px;">LVL <span id="p-lvl">1</span></span><br>
                <small id="p-class-ui" style="color:#a4b0be; text-transform: uppercase; font-size: 9px;">GUERREIRO</small>
            </div>
        </div>

        <div id="game-arena">
            <div class="floor"></div>
            
            <div id="player">
                <div class="p-sprite" id="vector-sprite" style="display: none;">
                    <div class="p-head"><div class="p-hair"></div></div>
                    <div class="p-body">
                        <div class="p-arm" id="main-arm"><div class="p-weapon" id="weapon-visual"></div></div>
                    </div>
                </div>
            </div>
            
            <div id="monster">
                <div class="m-body" id="m-body-color" style="display: none;">
                    <div class="m-eye"></div>
                </div>
            </div>

            <div style="position:absolute; top:12px; width:92%; left:4%; background: rgba(13, 17, 23, 0.85); padding: 8px; border-radius: 10px; backdrop-filter: blur(4px); border: 1px solid var(--border-ui);">
                <div class="hp-hud-container">
                    <div class="hp-row">
                        <span class="hp-label" style="color:#ff6b6b">INIMIGO</span>
                        <div class="hp-container"><div id="m-hp-bar" class="hp-fill" style="width:100%; background: var(--hp-monster)"></div></div>
                    </div>
                    <div class="hp-row">
                        <span class="hp-label" style="color:#1dd1a1">HERÓI</span>
                        <div class="hp-container"><div id="p-hp-bar" class="hp-fill" style="width:100%; background: var(--hp-player)"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard">
            <button class="bag-trigger-btn" onclick="openBagModal()">🎒 Ver Equipamentos & Mochila</button>

            <div class="stats-grid">
                <div class="stat-box"><span class="stat-val" id="st-str">0</span><span class="stat-label">FOR</span></div>
                <div class="stat-box"><span class="stat-val" id="st-def">0</span><span class="stat-label">DEF</span></div>
                <div class="stat-box"><span class="stat-val" id="st-luk">0</span><span class="stat-label">SOR</span></div>
                <div class="stat-box"><span class="stat-val" id="st-agi">0</span><span class="stat-label">AGI</span></div>
                <div class="stat-box"><span class="stat-val" id="st-eva">0</span><span class="stat-label">ESQ</span></div>
                <div class="stat-box"><span class="stat-val" id="st-int">0</span><span class="stat-label">INT</span></div>
                <div class="stat-box"><span class="stat-val" id="st-dex">0</span><span class="stat-label">DES</span></div>
                <div class="stat-box"><span class="stat-val" id="st-vit">0</span><span class="stat-label">VIT</span></div>
            </div>

            <div class="inventory-list" id="inv-ui" style="display: none;"></div>
            
            <center><button class="reset-save-btn" onclick="resetGameSave()">⚠️ Resetar Progresso</button></center>
        </div>
    </div>

    <div id="bag-modal" class="modal" style="display:none; background: rgba(5, 7, 10, 0.98); padding: 12px; justify-content: flex-start;">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-ui); padding-bottom:8px;">
            <span style="color:#ffcc00; font-weight:bold; font-size:16px; letter-spacing:1px;">EQUIPAMENTO & ARMAZÉM</span>
            <button onclick="closeBagModal()" style="background:transparent; border:none; color:#ff4757; font-size:20px; font-weight:bold; cursor:pointer;">✕</button>
        </div>

        <div class="bag-container">
            <div class="bag-column">
                <div class="bag-col-header">Personagem</div>
                <div class="eq-slots-list" id="eq-slots-ui"></div>
            </div>

            <div class="bag-column">
                <div class="bag-col-header">Mochila</div>
                <div class="grid-backpack" id="backpack-grid-ui"></div>
            </div>
        </div>

        <div id="item-details" class="item-details-pop">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div id="pop-item-title-wrapper">
                    <strong id="pop-item-name" style="font-size:14px; display:block;">Nome do Item</strong>
                    <span id="pop-item-rarity" style="font-size:9px; text-transform:uppercase; font-weight:bold;">RARIDADE</span>
                </div>
                <span id="pop-item-icon" style="font-size:28px;">⚔️</span>
            </div>
            <div id="pop-item-stats" style="color:#a4b0be; font-size:11px; background:rgba(0,0,0,0.2); padding:6px; border-radius:6px; margin:4px 0;"></div>
            <div style="display:flex; gap:8px; margin-top:4px;">
                <button id="pop-action-btn" class="class-btn" style="flex:1; border-color:#1dd1a1; color:#1dd1a1; padding:6px;" onclick="executeItemAction()">EQUIPAR</button>
                <button class="class-btn" style="flex:1; padding:6px;" onclick="closeDetailsPop()">FECHAR</button>
            </div>
        </div>
    </div>

<script>
    let player = {
        name: "", class: "Guerreiro", lvl: 1, 
        hp: 100, maxHp: 100, range: "melee",
        str: 5, def: 5, luk: 5, agi: 5, eva: 5, int: 5, dex: 5, vit: 5,
        skinColor: "#ffdbac", hairColor: "#4b3621",
        equipped: { weapon: null, head: null, torso: null, feet: null, ring: null, shield: null, wings: null },
        inventory: []
    };

    let game = { 
        stage: 1, kills: 0, isAttacking: false, monster: null, 
        lastAttackTime: 0, attackCounter: 0, isEngineRunning: false
    };

    const slotMapping = {
        head: { label: 'Elmo', icon: '🪖' },
        weapon: { label: 'Arma', icon: '⚔️' },
        torso: { label: 'Armadura', icon: '🛡️' },
        shield: { label: 'Escudo', icon: '🎚️' },
        feet: { label: 'Botas', icon: '🥾' },
        ring: { label: 'Anel', icon: '💍' },
        wings: { label: 'Asa', icon: '🕊️' }
    };

    let selectedItemContext = null; 
    let selectedItemIsEquipped = false;

    const classColors = {
        'Guerreiro': '#57606f', 'Arqueiro': '#2ed573', 'Mago': '#574b90',
        'Assassino': '#2f3542', 'Paladino': '#f1f2f6', 'Druida': '#10ac84'
    };

    const assets = {
        playerGif: "https://visual-aquamarine-74uhjc6d.edgeone.dev/7d4920500a20bf03aa226c3d206999a9.gif", 
        backgroundLandscape: "https://latin-salmon-sldip5ie.edgeone.dev/7d095ae81e099c20e7db776ea1a6e2ea.gif",
        normalMonsters: [
            "https://working-blush-wvzi37my.edgeone.dev/joe-dupras-revenant.gif",
            "https://i.ibb.co/S7c8BKMG/image.png"
        ],
        bossMonster: "https://i.ibb.co/3y8WY1B9/image.png"
    };

    function saveGame() {
        const saveData = {
            player: player,
            game: { stage: game.stage, kills: game.kills }
        };
        localStorage.setItem('shadow_legends_infinite_save', JSON.stringify(saveData));
    }

    function loadGame() {
        const rawData = localStorage.getItem('shadow_legends_infinite_save');
        if (!rawData) return false;

        try {
            const saved = JSON.parse(rawData);
            if (!saved || !saved.player || !saved.game) return false;
            
            player = Object.assign(player, saved.player);
            
            if(!player.equipped) player.equipped = { weapon: null, head: null, torso: null, feet: null, ring: null, shield: null, wings: null };
            if(!player.equipped.shield) player.equipped.shield = null;
            if(!player.equipped.wings) player.equipped.wings = null;
            if(player.dex === undefined) player.dex = 5;
            if(player.vit === undefined) player.vit = 5;
            if(!player.inventory) player.inventory = [];

            game.stage = saved.game.stage || 1;
            game.kills = saved.game.kills || 0;

            if(document.getElementById('p-skin')) document.getElementById('p-skin').value = player.skinColor || "#ffdbac";
            if(document.getElementById('p-hair')) document.getElementById('p-hair').value = player.hairColor || "#4b3621";

            return true;
        } catch(e) {
            console.error("Erro ao carregar o save corrompido:", e);
            return false;
        }
    }

    function resetGameSave() {
        if(confirm("Tem certeza que deseja apagar todo o progresso do seu herói?")) {
            localStorage.removeItem('shadow_legends_infinite_save');
            window.location.reload();
        }
    }

    function selClass(c) {
        player.class = c;
        document.querySelectorAll('.class-btn').forEach(b => {
            b.classList.remove('active');
            if(b.innerText.startsWith(c.toUpperCase())) b.classList.add('active');
        });
        updateVisual();
    }

    function updateVisual() {
        const pEl = document.getElementById('player');
        const vSprite = document.getElementById('vector-sprite');
        if (!pEl) return;

        if(player.class === 'Guerreiro') {
            pEl.style.backgroundImage = `url('${assets.playerGif}')`;
            if(vSprite) vSprite.style.display = 'none';
        } else {
            pEl.style.backgroundImage = 'none';
            if(vSprite) vSprite.style.display = 'flex';
            
            if(document.getElementById('p-skin')) player.skinColor = document.getElementById('p-skin').value;
            if(document.getElementById('p-hair')) player.hairColor = document.getElementById('p-hair').value;

            document.documentElement.style.setProperty('--skin', player.skinColor);
            document.documentElement.style.setProperty('--hair', player.hairColor);
            document.documentElement.style.setProperty('--armor', classColors[player.class] || '#57606f');
            
            const w = document.getElementById('weapon-visual');
            if(w) {
                if(player.class === 'Paladino') { w.style.width = '8px'; w.style.backgroundColor = '#d1d8e0'; }
                else if(player.class === 'Assassino') { w.style.width = '4px'; w.style.backgroundColor = '#747d8c'; }
                else if(player.class === 'Mago' || player.class === 'Druida') { w.style.width = '5px'; w.style.backgroundColor = '#ffa502'; }
                else { w.style.backgroundColor = 'transparent'; }
            }
        }
    }

    function startGame() {
        player.name = document.getElementById('p-name').value || "HERÓI";
        const c = player.class;
        
        player.str = 5; player.def = 5; player.luk = 5; player.agi = 5;
        player.eva = 5; player.int = 5; player.dex = 5; player.vit = 5;

        if(c === "Guerreiro") { player.str += 10; player.def += 5; player.vit += 5; player.range = "melee"; }
        if(c === "Arqueiro") { player.agi += 10; player.luk += 5; player.dex += 5; player.range = "ranged"; }
        if(c === "Mago") { player.int += 10; player.luk += 5; player.dex += 3; player.range = "magic"; }
        if(c === "Assassino") { player.agi += 10; player.eva += 10; player.dex += 5; player.range = "melee"; }
        if(c === "Paladino") { player.def += 12; player.str += 3; player.vit += 5; player.range = "melee"; }
        if(c === "Druida") { player.int += 5; player.def += 5; player.vit += 5; player.range = "magic"; }

        const initialStats = calcStats();
        player.hp = initialStats.maxHp;

        initGameEngine();
    }

    function initGameEngine() {
        document.getElementById('screen-setup').style.display = 'none';
        document.getElementById('game-main').style.display = 'flex';
        document.getElementById('p-class-ui').innerText = player.class;
        document.getElementById('game-arena').style.backgroundImage = `url('${assets.backgroundLandscape}')`;
        
        updateVisual();
        spawnMonster();
        
        game.lastAttackTime = performance.now();
        saveGame();
        
        if (!game.isEngineRunning) {
            game.isEngineRunning = true;
            engine();
        }
    }

    function spawnMonster() {
        const isBoss = (game.kills >= 10);
        
        let baseHp, baseAtk, baseDef;

        if (game.stage === 1) {
            baseHp = isBoss ? 172.8 : 46.08;  
            baseAtk = isBoss ? 7.68 : 3.84;   
            baseDef = 0;                
        } else {
            // CORREÇÃO: O poder dos monstros agora depende APENAS do progresso da fase (game.stage)
            // O nível do jogador (player.lvl) foi completamente removido do cálculo!
            const stageScale = 1.0 + (game.stage * 0.15);  
            
            baseHp = ((70 + (game.stage * 45)) * (isBoss ? 4.5 : 1) * stageScale) * 0.5; 
            baseAtk = ((8 + (game.stage * 4)) * (isBoss ? 1.4 : 1) * stageScale) * 0.5;
            baseDef = (3 + (game.stage * 2)) * stageScale * 0.5;
        }

        game.monster = {
            isBoss: isBoss,
            maxHp: Math.max(5, Math.floor(baseHp)),
            hp: Math.max(5, Math.floor(baseHp)),
            atk: Math.max(1, Math.floor(baseAtk)),
            def: Math.max(0, Math.floor(baseDef))
        };
        
        const mEl = document.getElementById('monster');
        const mBody = document.getElementById('m-body-color');
        
        if (mEl) {
            if (isBoss) {
                mEl.style.backgroundImage = `url('${assets.bossMonster}')`;
                mEl.style.width = '100px';
                mEl.style.height = '100px';
            } else {
                const randomNormalImg = assets.normalMonsters[Math.floor(Math.random() * assets.normalMonsters.length)];
                mEl.style.backgroundImage = `url('${randomNormalImg}')`;
                mEl.style.width = '75px';
                mEl.style.height = '75px';
            }
        }
        if (mBody) mBody.style.display = 'none';
        
        updateUI();
    }

    function engine() {
        if (!game.isEngineRunning) return;
        const currentTime = performance.now();
        const stats = calcStats();
        let attackCooldown = 1500 - (stats.agi * 8) - (stats.dex * 2);

        if (attackCooldown < 200) attackCooldown = 200; 

        if (!game.isAttacking && game.monster && game.monster.hp > 0 && (currentTime - game.lastAttackTime >= attackCooldown)) {
            combatCycle(stats);
            game.lastAttackTime = currentTime;
        }
        requestAnimationFrame(engine);
    }

    function combatCycle(stats) {
        if (!game.monster || game.monster.hp <= 0) return;
        game.isAttacking = true;
        const pEl = document.getElementById('player');
        const arm = document.getElementById('main-arm');

        game.attackCounter++;

        if(player.range === "melee") {
            const containerWidth = document.getElementById('game-arena').clientWidth;
            if (pEl) pEl.style.left = (containerWidth - 120) + "px";
            setTimeout(() => { 
                if(player.class !== 'Guerreiro' && arm) arm.style.transform = "rotate(-90deg)";
                applyDamage(stats); 
            }, 120);
        } else {
            if(player.class !== 'Guerreiro' && arm) arm.style.transform = "rotate(-45deg)";
            createProjectile(player.range, stats);
        }

        setTimeout(() => {
            if (pEl) pEl.style.left = "30px";
            if(player.class !== 'Guerreiro' && arm) arm.style.transform = "rotate(0deg)";
            
            if(game.monster && game.monster.hp > 0) {
                setTimeout(() => {
                    if (!game.monster || game.monster.hp <= 0) { game.isAttacking = false; return; }
                    let monsterAccuracyBonus = game.monster.isBoss ? 60 : 35;
                    let hitChance = Math.max(25, (100 - stats.eva) + monsterAccuracyBonus);

                    if(Math.random() * 100 <= hitChance) {
                        let mDmg = Math.max(1, game.monster.atk - (stats.def * 0.35));
                        
                        if(stats.bonusShield > 0) {
                            let reduction = mDmg * (stats.bonusShield / 100);
                            mDmg = Math.max(1, mDmg - reduction);
                        }

                        player.hp -= mDmg;
                        showDmg(Math.floor(mDmg), 'player');
                        const mainContainer = document.getElementById('game-main');
                        if (mainContainer) {
                            mainContainer.classList.add('shake');
                            setTimeout(()=>mainContainer.classList.remove('shake'), 150);
                        }

                        if(stats.bonusReflect > 0 && game.monster && game.monster.hp > 0) {
                            let reflectedDmg = Math.floor(mDmg * (stats.bonusReflect / 100));
                            if(reflectedDmg > 0) {
                                game.monster.hp = Math.max(0, game.monster.hp - reflectedDmg);
                                showDmg(reflectedDmg, 'monster', true);
                            }
                        }
                    } else {
                        showDmg("MISS", 'player', true);
                    }
                    checkGameState(stats);
                }, 150);
            } else {
                checkGameState(stats);
            }
            
            game.isAttacking = false;
        }, 300);
    }

    function createProjectile(type, stats) {
        const arena = document.getElementById('game-arena');
        if (!arena) return;
        const proj = document.createElement('div');
        proj.className = 'projectile';
        proj.style.left = "90px";
        proj.style.bottom = "20%";
        if(type === 'magic') proj.style.background = "linear-gradient(90deg, #fff, #b388ff)";
        arena.appendChild(proj);

        let pos = 90;
        const containerWidth = arena.clientWidth;
        let id = setInterval(() => {
            pos += 16;
            proj.style.left = pos + "px";
            if(pos >= containerWidth - 100) {
                clearInterval(id);
                proj.remove();
                applyDamage(stats);
            }
        }, 16);
    }

    const itemNamingData = {
        prefixes: {
            comum: ['Gasto', 'Treino', 'Ferrugem', 'Recruta', 'Padrão'],
            uncommon: ['Forjado', 'Aço Frio', 'Caçador', 'Guardião', 'Vanguardista'],
            rare: ['Místico', 'Obsidiana', 'Tempestade', 'Rúnico', 'Ancião'],
            'super-rare': ['Celestial', 'Vortex', 'Soberano', 'Abissal', 'Do Caos'],
            diamante: ['Eterno', 'Cosmo', 'Supernova', 'Divino', 'Infinito']
        },
        slots: {
            weapon: ['Gume', 'Lâmina', 'Arco', 'Cajado', 'Montante'],
            head: ['Visor', 'Yoroi', 'Coroa', 'Diadema', 'Capacete'],
            torso: ['Manto', 'Peitoral', 'Placa Pesada', 'Cota Runada', 'Couraça'],
            feet: ['Grevas', 'Botas', 'Passos Rápidos', 'Sapatilhas', 'Coturnos'],
            ring: ['Anel', 'Selo Mágico', 'Aliança', 'Signo', 'Eternidade'],
            shield: ['Brocquel', 'Escudo Real', 'Égide', 'Baluarte', 'Grande Muralha'],
            wings: ['Asas Celestiales', 'Plumas Flamejantes', 'Planador Corrompido', 'Asas Arcânicas', 'Mantofólio']
        }
    };

    function generateCoolItemName(slotKey, rarity) {
        const prefList = itemNamingData.prefixes[rarity] || itemNamingData.prefixes.comum;
        const baseList = itemNamingData.slots[slotKey] || ['Item'];
        const p = prefList[Math.floor(Math.random() * prefList.length)];
        const b = baseList[Math.floor(Math.random() * baseList.length)];
        return `${p} ${b}`;
    }

    function createLoot() {
        const slotKeys = ['weapon', 'head', 'torso', 'feet', 'ring', 'shield', 'wings'];
        const allStats = ['str', 'def', 'luk', 'agi', 'eva', 'int', 'dex', 'vit'];
        
        const roll = Math.random() * 100; 
        let rarity = 'comum';
        let attributesCount = 3;

        if (roll <= 0.009) {       
            rarity = 'diamante';       
            attributesCount = 8;
        } else if (roll <= 0.099) {  
            rarity = 'super-rare';     
            attributesCount = 6;
        } else if (roll <= 0.999) {   
            rarity = 'rare';           
            attributesCount = 5;
        } else if (roll <= 35.0) {
            rarity = 'uncommon';
            attributesCount = 4;
        }

        let selectedStats = [];
        let statsPool = [...allStats];
        
        for(let n = 0; n < attributesCount; n++) {
            if(statsPool.length === 0) statsPool = [...allStats];
            let index = Math.floor(Math.random() * statsPool.length);
            
            let statValBase = game.stage * (rarity === 'diamante' ? 3.5 : rarity === 'super-rare' ? 2.5 : rarity === 'rare' ? 1.6 : rarity === 'uncommon' ? 1.0 : 0.6);
            let finalVal = Math.max(1, Math.floor(statValBase + Math.random() * 2));

            selectedStats.push({ name: statsPool[index], val: finalVal });
            statsPool.splice(index, 1);
        }

        let pctShield = 0, pctLifesteal = 0, pctCritDmg = 0, pctReflect = 0;
        const possibleBonusTypes = ['shield', 'lifesteal', 'critDmg', 'reflect'];

        if (rarity === 'diamante') {
            let selectedBonusTypes = [];
            while (selectedBonusTypes.length < 2) {
                let randomType = possibleBonusTypes[Math.floor(Math.random() * possibleBonusTypes.length)];
                if (!selectedBonusTypes.includes(randomType)) selectedBonusTypes.push(randomType);
            }
            let valLow = Math.floor(Math.random() * (10 - 2 + 1)) + 2;   
            let valHigh = Math.floor(Math.random() * (20 - 15 + 1)) + 15; 
            selectedBonusTypes.forEach((type, idx) => {
                let finalVal = (idx === 0) ? valLow : valHigh;
                if (type === 'shield') pctShield = finalVal;
                if (type === 'lifesteal') pctLifesteal = finalVal;
                if (type === 'critDmg') pctCritDmg = finalVal;
                if (type === 'reflect') pctReflect = finalVal;
            });
        } else {
            let chosenBonus = possibleBonusTypes[Math.floor(Math.random() * possibleBonusTypes.length)];
            let bMin = 2, bMax = 5;
            if (rarity === 'uncommon') { bMin = 5; bMax = 8; }
            else if (rarity === 'rare') { bMin = 8; bMax = 12; }
            else if (rarity === 'super-rare') { bMin = 12; bMax = 15; }
            let generatedVal = Math.floor(Math.random() * (bMax - bMin + 1)) + bMin;
            if (chosenBonus === 'shield') pctShield = generatedVal;
            if (chosenBonus === 'lifesteal') pctLifesteal = generatedVal;
            if (chosenBonus === 'critDmg') pctCritDmg = generatedVal;
            if (chosenBonus === 'reflect') pctReflect = generatedVal;
        }

        const pickedSlot = slotKeys[Math.floor(Math.random() * slotKeys.length)];
        const customName = generateCoolItemName(pickedSlot, rarity);

        const item = {
            id: Date.now() + Math.random(),
            slot: pickedSlot,
            name: customName,
            rarity: rarity,
            stats: selectedStats,
            bonusShield: pctShield,
            bonusLifesteal: pctLifesteal,
            bonusCritDmg: pctCritDmg,
            bonusReflect: pctReflect,
            icon: slotMapping[pickedSlot].icon
        };

        if(player.inventory.length < 24) {
            player.inventory.unshift(item);
        } else {
            player.inventory.pop();
            player.inventory.unshift(item);
        }

        const currentEquipped = player.equipped[item.slot];
        let totalNewVal = item.stats.reduce((acc, s) => acc + s.val, 0);
        let totalCurrentVal = currentEquipped ? currentEquipped.stats.reduce((acc, s) => acc + s.val, 0) : -1;

        if(!currentEquipped || totalNewVal > totalCurrentVal) {
            const oldStats = calcStats();
            const hpPercent = player.hp / oldStats.maxHp;
            
            player.inventory.splice(player.inventory.indexOf(item), 1);
            
            if (currentEquipped && player.inventory.length < 24) {
                player.inventory.push(currentEquipped);
            }
            
            player.equipped[item.slot] = item;
            const newStats = calcStats();
            player.hp = Math.round(hpPercent * newStats.maxHp);
        }
        
        saveGame();
        updateUI();
    }

    function gainRandomStatsByClass() {
        const classPools = {
            'Guerreiro': ['str', 'str', 'def', 'vit'],
            'Arqueiro': ['agi', 'agi', 'luk', 'dex'],
            'Mago': ['int', 'int', 'dex', 'def'],
            'Assassino': ['agi', 'eva', 'dex', 'luk'],
            'Paladino': ['def', 'def', 'vit', 'str'],
            'Druida': ['int', 'def', 'vit', 'str']
        };

        const pool = classPools[player.class] || ['str', 'def', 'luk', 'agi', 'eva', 'int', 'dex', 'vit'];
        
        for (let i = 0; i < 2; i++) {
            const randomStat = pool[Math.floor(Math.random() * pool.length)];
            player[randomStat] += 1;
            setTimeout(() => { showStatGainPopup(`+1 ${randomStat.toUpperCase()}`); }, i * 250);
        }
    }

    function applyDamage(stats) {
        if (!game.monster || game.monster.hp <= 0) return;
        
        let crit = Math.random() * 100 < (stats.luk + (stats.dex * 0.5));
        let baseDmg = Math.max(5, (stats.str + stats.int) - (game.monster.def * 0.4));
        
        if(crit) {
            let multiplier = 1.5 + (stats.bonusCritDmg / 100);
            baseDmg *= multiplier;
        }

        baseDmg = Math.floor(baseDmg);
        game.monster.hp -= baseDmg;
        showDmg(baseDmg, 'monster', crit);

        if(stats.bonusLifesteal > 0) {
            let healLoot = Math.floor(baseDmg * (stats.bonusLifesteal / 100));
            if(healLoot > 0) {
                player.hp = Math.min(stats.maxHp, player.hp + healLoot);
                showHealPopup(`+${healLoot} ❤️`);
            }
        }

        updateUI();
    }

    function checkGameState(stats) {
        if (!game.monster) return;
        if(player.hp <= 0) {
            game.stage = Math.max(1, game.stage - 1);
            game.kills = 0;
            player.hp = stats.maxHp;
            saveGame();
            spawnMonster();
        } else if(game.monster.hp <= 0) {
            if(game.monster.isBoss) {
                let healAmount = Math.floor(stats.maxHp * 0.15);
                player.hp = Math.min(stats.maxHp, player.hp + healAmount);
                showHealPopup(`+${healAmount} HP`);

                game.stage++;
                game.kills = 0;
                createLoot();
                
                player.lvl++;
                gainRandomStatsByClass();
                
                const currentStats = calcStats();
                player.hp = currentStats.maxHp;
            } else {
                let healAmount = Math.floor(stats.maxHp * 0.06);
                player.hp = Math.min(stats.maxHp, player.hp + healAmount);
                showHealPopup(`+${healAmount} HP`);
                game.kills++;
            }
            saveGame();
            spawnMonster();
        }
        updateUI();
    }

        const arena = document.getElementById('game-arena');
        if (!arena) return;
        const d = document.createElement('div');
        d.className = 'dmg-popup';

    function calcStats() {
        let s = { 
            str: player.str, def: player.def, luk: player.luk, 
            agi: player.agi, eva: player.eva, int: player.int,
            dex: player.dex, vit: player.vit,
            bonusShield: 0, bonusLifesteal: 0, bonusCritDmg: 0, bonusReflect: 0 
        };
        
        if (player.equipped) {
            Object.values(player.equipped).forEach(item => {
                if(item) {
                    if(item.stats) {
                        item.stats.forEach(stat => {
                            if(s[stat.name] !== undefined) s[stat.name] += stat.val;
                        });
                    }
                    if(item.bonusShield) s.bonusShield += item.bonusShield;
                    if(item.bonusLifesteal) s.bonusLifesteal += item.bonusLifesteal;
                    if(item.bonusCritDmg) s.bonusCritDmg += item.bonusCritDmg;
                    if(item.bonusReflect) s.bonusReflect += item.bonusReflect;
                }
            });
        }
        
        s.maxHp = Math.floor(100 + (player.lvl * 15) + (s.def * 4) + (s.vit * 8));
        return s;
    }

                <div class="eq-slot-icon">${meta.icon}</div>
                <div class="eq-slot-info">
                    <div class="eq-slot-name" style="color:#747d8c;">Vazio</div>
                    <div class="eq-slot-type">${meta.label}</div>
                </div>
            `;
            
            if(currentItem) {
                boxClass += ` filled-${currentItem.rarity}`;
                let rarityColor = `var(--${currentItem.rarity})`;

                    <div class="eq-slot-icon">${currentItem.icon}</div>
                    <div class="eq-slot-info">
                        <div class="eq-slot-name" style="color:${rarityColor};">${currentItem.name}</div>

    function showItemDetails(item, isEquippedContext) {
        selectedItemContext = item;
        selectedItemIsEquipped = isEquippedContext;
        
        const detailsPop = document.getElementById('item-details');
        const nameEl = document.getElementById('pop-item-name');
        const rarityEl = document.getElementById('pop-item-rarity');
        const iconEl = document.getElementById('pop-item-icon');
        const statsEl = document.getElementById('pop-item-stats');
        const actionBtn = document.getElementById('pop-action-btn');

        if(nameEl) { nameEl.innerText = item.name; nameEl.style.color = `var(--${item.rarity})`; }
        if(rarityEl) { rarityEl.innerText = `${item.rarity} | Slot: ${slotMapping[item.slot].label}`; rarityEl.style.color = `var(--${item.rarity})`; }
        if(iconEl) iconEl.innerText = item.icon;

        let statStr = '';
        if(item.stats) {
            item.stats.forEach(st => { statStr += `<div>+${st.val} ${st.name.toUpperCase()}</div>`; });
        }
        
        if(item.bonusShield)    statStr += `<div style="color:#00ecec; font-weight:bold;">+${item.bonusShield}% PROTEÇÃO</div>`;
        if(item.bonusLifesteal) statStr += `<div style="color:#ff4757; font-weight:bold;">+${item.bonusLifesteal}% ROUBO DE VIDA</div>`;
        if(item.bonusCritDmg)   statStr += `<div style="color:#ffcc00; font-weight:bold;">+${item.bonusCritDmg}% DANO CRÍTICO</div>`;
        if(item.bonusReflect)   statStr += `<div style="color:#a55eea; font-weight:bold;">+${item.bonusReflect}% REFLETIR GOLPE</div>`;

            } else {
                actionBtn.innerText = 'EQUIPAR';
                actionBtn.style.borderColor = '#ffcc00';
                actionBtn.style.color = '#ffcc00';
            }
        }
        if(detailsPop) detailsPop.style.display = 'flex';
    }

    function executeItemAction() {
        if(!selectedItemContext) return;
        
        const item = selectedItemContext;
        const oldStats = calcStats();
        const hpPercent = player.hp / oldStats.maxHp;

        if(selectedItemIsEquipped) {
            if (player.inventory.length < 24) {
                player.inventory.push(item);
                player.equipped[item.slot] = null;
            } else {
                alert("Mochila cheia para desequipar!");
                return;
            }
        } else {
            const itemIndex = player.inventory.indexOf(item);
            if (itemIndex > -1) {
                player.inventory.splice(itemIndex, 1);
            }
            
            const itemAntigo = player.equipped[item.slot];
            player.equipped[item.slot] = item;
            
            if (itemAntigo) {
                player.inventory.push(itemAntigo);
            }
        }

        const newStats = calcStats();
        player.hp = Math.round(hpPercent * newStats.maxHp);
        if(player.hp <= 0) player.hp = 1;

        closeDetailsPop();
        saveGame();
        renderBagUI();
        updateUI();
    }

    function closeDetailsPop() {
        const detailsPop = document.getElementById('item-details');
        if(detailsPop) detailsPop.style.display = 'none';
        selectedItemContext = null;
    }

    function updateUI() {
        if (!game.monster) return;
        const stats = calcStats();
        
        const pLvlEl = document.getElementById('p-lvl');
        const stageInfoEl = document.getElementById('stage-info');
        const killsInfoEl = document.getElementById('kills-info');
        const pHpBarEl = document.getElementById('p-hp-bar');
        const mHpBarEl = document.getElementById('m-hp-bar');
        
        if(pLvlEl) pLvlEl.innerText = player.lvl;
        if(stageInfoEl) stageInfoEl.innerText = `FASE ${Math.floor(game.stage/5) + 1}-${(game.stage%5) || 5}`;
        if(killsInfoEl) killsInfoEl.innerText = game.monster.isBoss ? "CHEFE!" : `MONSTROS: ${game.kills}/10`;
        
        if(pHpBarEl) pHpBarEl.style.width = Math.min(100, Math.max(0, (player.hp / stats.maxHp * 100))) + "%";
        if(mHpBarEl) mHpBarEl.style.width = Math.min(100, Math.max(0, (game.monster.hp / game.monster.maxHp * 100))) + "%";

        ['str','def','luk','agi','eva','int','dex','vit'].forEach(st => {
            const el = document.getElementById('st-'+st);
            if(el) el.innerText = stats[st];
        });

        const bagModal = document.getElementById('bag-modal');
        if(bagModal && bagModal.style.display === 'flex') {
            renderBagUI();
        }
    }

    window.onload = function() {
        const hasSave = loadGame();
        if (hasSave) {
            initGameEngine();
        } else {
            updateVisual();
        }
    };
</script>
</body>
</html>
