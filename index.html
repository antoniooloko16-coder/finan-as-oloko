<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>METAL RPG: INFINITE ODYSSEY</title>
    <style>
        :root {
            --raro: #f1c40f; --comum: #bdc3c7; --bg: #0a0a0a;
            --panel: #1a1a1a; --accent: #e74c3c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* ARENA */
        #game-arena {
            position: relative; width: 100%; height: 40vh;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            border-bottom: 4px solid #333; overflow: hidden;
        }
        .floor { position: absolute; bottom: 0; width: 100%; height: 40px; background: #332211; border-top: 4px solid #4a3c2c; }

        /* PERSONAGEM */
        #player { position: absolute; bottom: 40px; left: 50px; width: 40px; height: 70px; transition: 0.3s; z-index: 10; }
        .p-head { width: 20px; height: 20px; background: var(--skin, #ffdbac); border-radius: 50%; margin: 0 auto; position: relative; }
        .p-hair { position: absolute; top: -5px; width: 100%; height: 12px; background: var(--hair, #4b3621); border-radius: 10px 10px 0 0; }
        .p-body { width: 28px; height: 35px; background: var(--armor, #34495e); margin: 0 auto; border-radius: 5px; position: relative; }
        .p-arm { width: 8px; height: 25px; background: var(--skin, #ffdbac); position: absolute; top: 5px; right: -6px; transform-origin: top; }
        .p-leg { width: 10px; height: 20px; background: #222; position: absolute; bottom: -18px; }

        /* INIMIGO */
        #monster { position: absolute; bottom: 40px; right: 50px; width: 60px; height: 80px; transition: 0.2s; }
        .m-body { width: 100%; height: 100%; background: #4a5d23; border-radius: 10px; position: relative; }
        .boss-glow { box-shadow: 0 0 20px #ff0000; border: 2px solid gold !important; }

        /* UI */
        .ui-top { padding: 10px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; font-size: 14px; }
        .hp-bar-container { width: 100%; height: 15px; background: #333; position: relative; }
        #player-hp-bar { height: 100%; background: #2ecc71; width: 100%; transition: 0.2s; }
        #monster-hp-bar { height: 100%; background: #e74c3c; width: 100%; transition: 0.2s; }

        .inventory-panel { flex: 1; background: var(--panel); padding: 10px; overflow-y: auto; display: flex; flex-direction: column; }
        .stats-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; font-size: 11px; margin-bottom: 10px; background: #000; padding: 5px; border-radius: 5px; }
        
        .item-slot { background: #252525; border: 1px solid #444; padding: 8px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .raro { border: 1px solid var(--raro); color: var(--raro); text-shadow: 0 0 5px rgba(241, 196, 15, 0.5); }
        .equipped-label { color: #2ecc71; font-weight: bold; font-size: 10px; }

        /* TELAS */
        .modal { position: fixed; inset: 0; background: #000; z-index: 100; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .hidden { display: none !important; }
        .color-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        
        .dmg-popup { position: absolute; color: white; font-weight: bold; animation: floatUp 0.8s forwards; pointer-events: none; }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <!-- CRIAÇÃO DE PERSONAGEM -->
    <div id="screen-setup" class="modal">
        <h1 style="text-align:center; color:var(--accent)">METAL RPG CREATOR</h1>
        <input type="text" id="in-name" placeholder="Nome do Herói" style="padding:12px; border-radius:5px;">
        
        <label>Classe:</label>
        <select id="in-class" style="padding:10px;">
            <option value="Guerreiro">Guerreiro (FOR/DEF)</option>
            <option value="Arqueiro">Arqueiro (AGI/SOR)</option>
            <option value="Mago">Mago (INT/SOR)</option>
            <option value="Assassino">Assassino (AGI/ESQ)</option>
            <option value="Paladino">Paladino (DEF/FOR)</option>
            <option value="Druida">Druida (INT/DEF)</option>
        </select>

        <label>Cor da Pele:</label>
        <div style="display:flex; gap:10px">
            <div class="color-btn" style="background:#ffdbac" onclick="setSkin('#ffdbac')"></div>
            <div class="color-btn" style="background:#8d5524" onclick="setSkin('#8d5524')"></div>
        </div>

        <label>Cor do Cabelo:</label>
        <div style="display:flex; gap:10px">
            <div class="color-btn" style="background:#4b3621" onclick="setHair('#4b3621')"></div>
            <div class="color-btn" style="background:#f1c40f" onclick="setHair('#f1c40f')"></div>
            <div class="color-btn" style="background:#e74c3c" onclick="setHair('#e74c3c')"></div>
        </div>

        <button onclick="initGame()" style="margin-top:auto; padding:20px; background:var(--accent); border:none; color:white; font-weight:bold; border-radius:10px;">START ADVENTURE</button>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="screen-game" class="hidden" style="height:100%; display:flex; flex-direction:column;">
        <div class="ui-top">
            <div>LVL: <span id="ui-lvl">1</span> | FASE: <span id="ui-stage">1</span></div>
            <div id="ui-stage-progress">Progresso: 0/10</div>
        </div>
        
        <div id="game-arena">
            <div class="hp-bar-container"><div id="monster-hp-bar"></div></div>
            <div id="player">
                <div class="p-head"><div class="p-hair"></div></div>
                <div class="p-body">
                    <div class="p-arm" id="p-arm"></div>
                </div>
                <div class="p-leg" style="left:5px"></div>
                <div class="p-leg" style="right:5px"></div>
            </div>
            <div id="monster">
                <div class="m-body" id="m-visual"></div>
            </div>
            <div class="floor"></div>
            <div class="hp-bar-container" style="position:absolute; bottom:0;"><div id="player-hp-bar"></div></div>
        </div>

        <div class="inventory-panel">
            <div class="stats-summary" id="ui-stats">
                <!-- Stats preenchidos via JS -->
            </div>
            <h4 style="margin:5px 0">EQUIPAMENTOS (TOP 10)</h4>
            <div id="ui-inventory">
                <!-- Itens aqui -->
            </div>
        </div>
    </div>

<script>
    // ESTADO GLOBAL
    let gameState = {
        player: {
            name: "", class: "", lvl: 1, exp: 0, 
            hp: 100, maxHp: 100,
            str: 5, def: 5, luk: 5, agi: 5, eva: 5, int: 5,
            equipped: { weapon: null, head: null, torso: null, feet: null, ring: null },
            inventory: []
        },
        stage: 1,
        kills: 0,
        isAttacking: false,
        monster: null
    };

    function setSkin(c) { document.documentElement.style.setProperty('--skin', c); }
    function setHair(c) { document.documentElement.style.setProperty('--hair', c); }

    function initGame() {
        gameState.player.name = document.getElementById('in-name').value || "Herói";
        gameState.player.class = document.getElementById('in-class').value;
        
        // Bonus inicial por classe
        const c = gameState.player.class;
        if(c === "Guerreiro") { gameState.player.str += 10; gameState.player.def += 5; }
        if(c === "Arqueiro") { gameState.player.agi += 10; gameState.player.luk += 5; }
        if(c === "Mago") { gameState.player.int += 10; gameState.player.luk += 5; }
        if(c === "Assassino") { gameState.player.agi += 10; gameState.player.eva += 10; }
        
        document.getElementById('screen-setup').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        
        spawnMonster();
        gameLoop();
    }

    function spawnMonster() {
        const isBoss = (gameState.kills >= 10);
        const mult = gameState.stage;
        gameState.monster = {
            isBoss: isBoss,
            hp: (30 + (mult * 20)) * (isBoss ? 5 : 1),
            maxHp: (30 + (mult * 20)) * (isBoss ? 5 : 1),
            atk: 2 + (mult * 1.5),
            def: 1 + (mult * 0.5)
        };
        
        const mv = document.getElementById('m-visual');
        mv.className = isBoss ? "m-body boss-glow" : "m-body";
        document.getElementById('ui-stage-progress').innerText = isBoss ? "CHEFE!" : `Progresso: ${gameState.kills}/10`;
    }

    function createLoot() {
        const slots = ['weapon', 'head', 'torso', 'feet', 'ring'];
        const stats = ['str', 'def', 'luk', 'agi', 'eva', 'int'];
        const isRare = Math.random() < 0.0001; // 0.01% conforme pedido (0.0001 = 0.01%)
        
        const item = {
            id: Date.now(),
            slot: slots[Math.floor(Math.random() * slots.length)],
            mainStat: stats[Math.floor(Math.random() * stats.length)],
            lvl: gameState.stage,
            rare: isRare,
            val: Math.floor(gameState.stage * (isRare ? 10 : 2) + Math.random() * 5)
        };

        gameState.player.inventory.unshift(item);
        if(gameState.player.inventory.length > 10) gameState.player.inventory.pop();
        
        // Auto-Equipar se for melhor
        const current = gameState.player.equipped[item.slot];
        if(!current || item.val > current.val) {
            gameState.player.equipped[item.slot] = item;
        }
        updateUI();
    }

    function calculateTotalStats() {
        let total = {...gameState.player};
        Object.values(gameState.player.equipped).forEach(item => {
            if(item) total[item.mainStat] += item.val;
        });
        return total;
    }

    function gameLoop() {
        if(!gameState.isAttacking) performTurn();
        requestAnimationFrame(gameLoop);
    }

    function performTurn() {
        gameState.isAttacking = true;
        const stats = calculateTotalStats();
        
        // Herói Ataca
        const arm = document.getElementById('p-arm');
        arm.style.transform = "rotate(-90deg)";
        
        setTimeout(() => {
            // Dano Herói
            let dmg = Math.max(1, (stats.str + stats.int) - (gameState.monster.def/2));
            if(Math.random() * 100 < stats.luk) dmg *= 2; // Crítico
            gameState.monster.hp -= dmg;
            showDmg(dmg, 'monster', stats.luk);

            // Se monstro vivo, ele contra-ataca
            if(gameState.monster.hp > 0) {
                if(Math.random() * 100 > stats.eva) {
                    let mDmg = Math.max(1, gameState.monster.atk - (stats.def / 3));
                    gameState.player.hp -= mDmg;
                    showDmg(mDmg, 'player', false);
                } else {
                    showDmg("ESQUIVA!", 'player', true);
                }
            }

            // Checar Morte ou Vitória
            if(gameState.player.hp <= 0) {
                gameState.stage = Math.max(1, gameState.stage - 1);
                gameState.kills = 0;
                gameState.player.hp = stats.maxHp;
                spawnMonster();
            } else if(gameState.monster.hp <= 0) {
                if(gameState.monster.isBoss) {
                    gameState.stage++;
                    gameState.kills = 0;
                    createLoot();
                } else {
                    gameState.kills++;
                }
                spawnMonster();
            }

            arm.style.transform = "rotate(0deg)";
            updateUI();
            setTimeout(() => { gameState.isAttacking = false; }, 400 - (stats.agi * 2));
        }, 200);
    }

    function showDmg(val, target, special) {
        const div = document.createElement('div');
        div.className = 'dmg-popup';
        div.innerText = val;
        div.style.color = special ? 'gold' : 'white';
        div.style.left = (target === 'player' ? 70 : window.innerWidth - 100) + 'px';
        div.style.bottom = '150px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    function updateUI() {
        const stats = calculateTotalStats();
        document.getElementById('ui-lvl').innerText = gameState.player.lvl;
        document.getElementById('ui-stage').innerText = gameState.stage;
        document.getElementById('player-hp-bar').style.width = (gameState.player.hp / stats.maxHp * 100) + "%";
        document.getElementById('monster-hp-bar').style.width = (gameState.monster.hp / gameState.monster.maxHp * 100) + "%";
        
        document.getElementById('ui-stats').innerHTML = `
            <div>FOR: ${stats.str}</div><div>DEF: ${stats.def}</div><div>SOR: ${stats.luk}</div>
            <div>AGI: ${stats.agi}</div><div>ESQ: ${stats.eva}</div><div>INT: ${stats.int}</div>
        `;

        let invHtml = "";
        gameState.player.inventory.forEach(item => {
            const isEquipped = gameState.player.equipped[item.slot] === item;
            invHtml += `
                <div class="item-slot ${item.rare ? 'raro' : ''}">
                    <span>LVL ${item.lvl} ${item.slot.toUpperCase()} (+${item.val} ${item.mainStat.toUpperCase()})</span>
                    ${isEquipped ? '<span class="equipped-label">EQUIPADO</span>' : ''}
                </div>
            `;
        });
        document.getElementById('ui-inventory').innerHTML = invHtml;
    }
</script>
</body>
</html>
