<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Idle RPG - 16 Bit</title>
    <style>
        /* Estilo Geral - Visual SNES/Retro */
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        #game-container {
            width: 600px;
            background-color: #222;
            border: 4px solid #fff;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }

        /* Tela de Criação */
        .menu-screen {
            text-align: center;
        }
        .setup-group {
            margin: 15px 0;
        }
        select, input, button {
            background: #333;
            color: #fff;
            border: 2px solid #fff;
            padding: 8px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #555; }

        /* Tela de Jogo */
        /* Cenário estilo Super Mario (Fixo no centro, monstros andam) */
        #stage-canvas {
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, #5c94fc 0%, #5c94fc 70%, #00a800 70%, #00a800 100%);
            border: 2px solid #fff;
            position: relative;
            overflow: hidden;
        }

        #player-sprite {
            width: 32px;
            height: 48px;
            background-color: #ffcc99; /* Cor base da pele */
            position: absolute;
            bottom: 30px;
            left: 284px; /* Centro exato do Canvas de 600px (600/2 - 16) */
            border-radius: 4px;
            transition: transform 0.1s;
        }

        #player-hair {
            width: 32px;
            height: 16px;
            background-color: #ff0000; /* Cor base do cabelo */
            position: absolute;
            top: -12px;
            left: 0;
        }

        #monster-sprite {
            width: 32px;
            height: 32px;
            background-color: #990000;
            position: absolute;
            bottom: 30px;
            right: -40px;
        }

        /* Interface Inferior (Status e Inventário) */
        .game-ui {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }
        .panel {
            border: 2px solid #fff;
            padding: 10px;
            background: #111;
            height: 180px;
            overflow-y: auto;
        }
        .item-slot {
            background: #333;
            border: 1px solid #777;
            padding: 3px;
            margin: 4px 0;
            font-size: 12px;
        }
        .rare-item { color: #ff00ff; font-weight: bold; } /* Rosa/Roxo para Raros */
    </style>
</head>
<body>

<div id="game-container">
    <!-- TELA INICIAL / CUSTOMIZAÇÃO -->
    <div id="creation-screen" class="menu-screen">
        <h2>NINTENDO IDLE RPG</h2>
        <div class="setup-group">
            <label>Nome: </label>
            <input type="text" id="char-name" value="Heroi">
        </div>
        <div class="setup-group">
            <label>Classe: </label>
            <select id="char-class">
                <option value="Guerreiro">Guerreiro (+Força)</option>
                <option value="Mago">Mago (+Inteligência)</option>
                <option value="Arqueiro">Arqueiro (+Agilidade)</option>
            </select>
        </div>
        <div class="setup-group">
            <label>Cor do Cabelo: </label>
            <select id="char-hair">
                <option value="#ff0000">Vermelho</option>
                <option value="#0000ff">Azul</option>
                <option value="#f1c40f">Loiro</option>
                <option value="#ffffff">Branco</option>
            </select>
        </div>
        <button onclick="startGame()">INICIAR JOGO</button>
    </div>

    <!-- TELA DO JOGO ATIVO -->
    <div id="game-screen" class="hidden">
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span id="ui-name-lvl">Heroi - Lvl 1</span>
            <span id="ui-stage" style="color: #f1c40f; font-weight: bold;">Fase: 1</span>
        </div>
        
        <!-- Área Visual do Combate -->
        <div id="stage-canvas">
            <div id="player-sprite">
                <div id="player-hair"></div>
            </div>
            <div id="monster-sprite"></div>
        </div>

        <!-- Painéis de Dados -->
        <div class="game-ui">
            <div class="panel">
                <h3>Atributos</h3>
                <div id="stats-display">Carregando...</div>
            </div>
            <div class="panel">
                <h3>Últimos Loots</h3>
                <div id="loot-display">Nenhum item dropado ainda.</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ESTADO GLOBAL DO JOGO
    let player = {
        name: "", class: "", lvl: 1, exp: 0, expNeeded: 100,
        hp: 100, maxHp: 100, str: 10, def: 5, int: 5, agi: 5, luk: 5,
        eq_weapon: "Espada Quebrada"
    };

    let currentStage = 1;
    let monster = null;
    let monsterPos = 600; // Começa fora da tela à direita

    // INICIAR JOGO
    function startGame() {
        player.name = document.getElementById("char-name").value;
        player.class = document.getElementById("char-class").value;
        let hairColor = document.getElementById("char-hair").value;

        // Aplica customização visual básica
        document.getElementById("player-hair").style.backgroundColor = hairColor;
        document.getElementById("ui-name-lvl").innerText = `${player.name} (${player.class}) - Lvl ${player.lvl}`;

        // Ajusta status inicial baseado na classe
        if(player.class === "Guerreiro") { player.str += 5; player.maxHp += 20; }
        if(player.class === "Mago") player.int += 5;
        if(player.class === "Arqueiro") player.agi += 5;
        player.hp = player.maxHp;

        // Troca de tela
        document.getElementById("creation-screen").classList.add("hidden");
        document.getElementById("game-screen").classList.remove("hidden");

        spawnMonster();
        gameLoop();
    }

    // SPAWN DE MONSTROS (Escala matemática infinita)
    function spawnMonster() {
        monsterPos = 600; // Reseta posição na direita
        // A matemática abaixo faz os monstros escalarem infinitamente baseados no nível da fase
        monster = {
            lvl: currentStage,
            hp: Math.floor(20 * Math.pow(1.2, currentStage)),
            maxHp: Math.floor(20 * Math.pow(1.2, currentStage)),
            atk: Math.floor(4 * Math.pow(1.15, currentStage)),
            def: Math.floor(1 * Math.pow(1.1, currentStage))
        };
    }

    // GAME LOOP PRINCIPAL (Roda a cada quadro)
    function gameLoop() {
        let monsterEl = document.getElementById("monster-sprite");
        let playerEl = document.getElementById("player-sprite");

        // 1. Movimento: O monstro se mexe em direção ao jogador no centro
        if (monsterPos > 316) { // 316 é a colisão com o jogador que está em 284 + 32 de largura
            monsterPos -= 3 + (player.agi * 0.1); // Velocidade aumenta de leve com a agilidade do player
            monsterEl.style.left = monsterPos + "px";
        } else {
            // 2. Colisão / Combate (Troca de golpes rápida)
            // Player ataca monstro
            let damageToMonster = Math.max(1, (player.str + (player.class === "Mago" ? player.int : 0)) - monster.def);
            monster.hp -= damageToMonster;
            
            // Feedback visual de ataque (pequeno tranco)
            playerEl.style.transform = "translateX(10px)";
            setTimeout(() => { playerEl.style.transform = "translateX(0px)"; }, 50);

            if (monster.hp <= 0) {
                processVictory();
                spawnMonster();
            } else {
                // Monstro revida se sobreviver
                let damageToPlayer = Math.max(1, monster.atk - player.def);
                player.hp -= damageToPlayer;

                if (player.hp <= 0) {
                    processDefeat();
                    spawnMonster();
                }
            }
        }

        updateUI();
        requestAnimationFrame(gameLoop); // Mantém o loop ativo e fluido
    }

    // PROCESSAR VITÓRIA E GERAR LOOT
    function processVictory() {
        // Ganho de XP e avanço de fase
        player.exp += 20 * currentStage;
        if(player.exp >= player.expNeeded) {
            player.lvl++;
            player.exp = 0;
            player.expNeeded = Math.floor(player.expNeeded * 1.5);
            player.maxHp += 10;
            player.str += 2;
            player.def += 1;
            player.hp = player.maxHp;
        }

        // Drop de Itens (Chance base + 0.01% para Raros)
        let rollRaro = Math.random(); // Gera número entre 0 e 1
        let isRare = rollRaro <= 0.0001; // 0.01% de chance
        
        generateLoot(isRare);

        currentStage++; // Avança de fase infinitamente
    }

    // SE MORRER: REGRA DE OURO (Retorna 1 nível)
    function processDefeat() {
        if (currentStage > 1) {
            currentStage--; // Retorna para a fase anterior para farmar itens melhores
        }
        player.hp = player.maxHp; // Cura o herói para tentar novamente
    }

    // GERADOR DE EQUIPAMENTOS
    function generateLoot(isRare) {
        const tipos = ["Espada", "Capacete", "Bota", "Traje", "Anel"];
        const tipo = tipos[Math.floor(Math.random() * tipos.length)];
        let powerMultiplier = currentStage * (isRare ? 5 : 1); // Itens raros são 5x mais fortes
        
        let statusAdicional = Math.floor(1 + (Math.random() * powerMultiplier));
        let itemNome = `${tipo} de Lvl ${currentStage} ${isRare ? "[RARO]" : ""}`;

        // Equipamento Automático se for melhor (Simulação simples para o Core)
        if (tipo === "Espada") {
            player.str += statusAdicional;
            player.eq_weapon = itemNome;
        } else {
            player.def += statusAdicional; // Outros itens dão defesa nesta versão base
        }

        // Interface do Histórico de Loot
        let lootBox = document.getElementById("loot-display");
        let itemClass = isRare ? "item-slot rare-item" : "item-slot";
        lootBox.innerHTML = `<div class="${itemClass}">Ganhou: ${itemNome} (+${statusAdicional} Status)</div>` + lootBox.innerHTML;
    }

    // ATUALIZAR INTERFACE TEXTUAL
    function updateUI() {
        document.getElementById("ui-stage").innerText = `Fase: ${currentStage}`;
        document.getElementById("ui-name-lvl").innerText = `${player.name} (${player.class}) - Lvl ${player.lvl}`;
        
        document.getElementById("stats-display").innerHTML = `
            <b>HP:</b> ${player.hp}/${player.maxHp}<br>
            <b>XP:</b> ${player.exp}/${player.expNeeded}<br>
            <b>Força:</b> ${player.str}<br>
            <b>Defesa:</b> ${player.def}<br>
            <b>Arma Atual:</b> <span style="color:#2ecc71">${player.eq_weapon}</span>
        `;
    }
</script>

</body>
</html>
