<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE MOBILE RPG</title>
    <style>
        :root {
            --skin: #ffdbac; --armor: #34495e; --accent: #e74c3c;
            --forest: #1b3022; --floor: #3e2723;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background: #000; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            color: white; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* ARENA DE COMBATE (PORTRAIT) */
        #game-arena {
            position: relative; width: 100%; height: 55vh;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            overflow: hidden; border-bottom: 5px solid #222;
        }

        .cloud { position: absolute; background: rgba(255,255,255,0.2); border-radius: 20px; height: 20px; width: 60px; animation: moveCloud 20s linear infinite; }
        @keyframes moveCloud { from { left: -100px; } to { left: 100%; } }

        .ground { 
            position: absolute; bottom: 0; width: 100%; height: 60px; 
            background: var(--floor); border-top: 4px solid #5d4037;
        }

        /* PERSONAGEM REALISTA (CSS LAYERS) */
        #player {
            position: absolute; bottom: 55px; left: 20px;
            width: 50px; height: 90px; transition: left 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .p-head { 
            width: 24px; height: 26px; background: var(--skin); margin-left: 13px; 
            border-radius: 8px 8px 4px 4px; position: relative; border-bottom: 2px solid #d2b48c;
            box-shadow: inset -3px 0 5px rgba(0,0,0,0.2);
        }
        .p-hair { position: absolute; top: -2px; width: 100%; height: 10px; background: #4b3621; border-radius: 8px 8px 0 0; }
        .p-body { 
            width: 34px; height: 38px; background: var(--armor); margin-left: 8px; 
            border-radius: 6px; position: relative; border: 1px solid #1a252f;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
        }
        .p-arm { 
            width: 10px; height: 30px; background: var(--skin); position: absolute; 
            top: 2px; border-radius: 5px; border: 1px solid rgba(0,0,0,0.2); transform-origin: top;
        }
        .arm-r { right: -8px; z-index: 11; }
        .p-leg { width: 12px; height: 30px; background: #2c3e50; position: absolute; bottom: -28px; border-radius: 3px; }
        .leg-l { left: 4px; } .leg-r { right: 4px; }

        /* MONSTRO REALISTA (OGRO) */
        #monster {
            position: absolute; bottom: 55px; right: 20px;
            width: 90px; height: 110px; z-index: 5; transition: transform 0.1s;
        }
        .m-torso { 
            width: 70px; height: 80px; background: #4a5d23; border-radius: 40% 40% 20% 20%;
            position: relative; border: 3px solid #2d3a15; box-shadow: inset -10px 0 20px rgba(0,0,0,0.4);
        }
        .m-head { width: 40px; height: 40px; background: #4a5d23; position: absolute; top: -25px; left: 15px; border-radius: 50%; border: 2px solid #2d3a15; }
        .m-horn { width: 10px; height: 20px; background: #eee; position: absolute; top: -10px; border-radius: 50% 50% 0 0; transform: rotate(-20deg); }
        .m-eye { width: 8px; height: 8px; background: red; position: absolute; top: 15px; left: 8px; border-radius: 50%; box-shadow: 0 0 5px red; }

        /* EFEITOS E UI */
        .projectile {
            position: absolute; width: 15px; height: 4px; background: yellow; 
            border-radius: 2px; box-shadow: 0 0 10px orange; z-index: 100;
        }
        .magic-ball { width: 20px; height: 20px; border-radius: 50%; background: cyan; box-shadow: 0 0 15px blue; }

        .hp-container { 
            position: absolute; top: 20px; width: 80%; left: 10%; height: 25px; 
            background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 15px; overflow: hidden;
        }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); width: 100%; transition: 0.2s; }

        .ui-panel { 
            flex: 1; background: #111; padding: 20px; 
            display: flex; flex-direction: column; justify-content: space-between;
            border-top-left-radius: 25px; border-top-right-radius: 25px; margin-top: -20px; z-index: 20;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; }
        .stat-card { background: #222; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        
        .btn-action { 
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none; padding: 15px; border-radius: 15px; color: white;
            font-weight: bold; font-size: 18px; box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        /* ANIMAÇÕES */
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-3px, 0); } 100% { transform: translate(0, 0); } }
        .hit-flash { filter: brightness(3); }
        .swing { animation: swing 0.3s ease-in-out; }
        @keyframes swing { 0% { transform: rotate(0); } 50% { transform: rotate(-90deg) scale(1.2); } 100% { transform: rotate(0); } }
    </style>
</head>
<body>

    <div id="game-arena">
        <div class="cloud" style="top: 20%; animation-delay: -2s;"></div>
        <div class="cloud" style="top: 40%; animation-delay: -10s;"></div>
        
        <div class="hp-container"><div id="hp-fill"></div></div>

        <div id="player">
            <div class="p-head"><div class="p-hair"></div></div>
            <div class="p-body">
                <div class="p-arm arm-l"></div>
                <div class="p-arm arm-r" id="player-arm">
                    <div id="weapon-visual" style="position:absolute; bottom:-10px; width:6px; height:40px; background:#aaa; left:2px; border-radius:2px;"></div>
                </div>
            </div>
            <div class="p-leg leg-l"></div>
            <div class="p-leg leg-r"></div>
        </div>

        <div id="monster">
            <div class="m-head"><div class="m-horn"></div><div class="m-eye"></div></div>
            <div class="m-torso"></div>
        </div>

        <div class="ground"></div>
    </div>

    <div class="ui-panel">
        <div style="text-align:center">
            <h2 id="ui-name" style="margin:0; color:#f093fb">HERÓI</h2>
            <span id="ui-class-label" style="font-size:12px; color:#aaa">Classe: Carregando...</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">⚔️ ATK: <span id="stat-atk">10</span></div>
            <div class="stat-card">🎯 CRIT: <span id="stat-crit">5%</span></div>
            <div class="stat-card">📜 NIVEL: <span id="stat-lvl">1</span></div>
            <div class="stat-card">👾 KILLS: <span id="stat-kills">0</span></div>
        </div>

        <button class="btn-action" onclick="location.reload()">REINICIAR MISSÃO</button>
    </div>

    <!-- TELA INICIAL (SIMPLIFICADA) -->
    <div id="modal-start" style="position:fixed; inset:0; background:#000; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px">
        <h1 style="color:#f5576c">METAL RPG</h1>
        <input type="text" id="input-name" placeholder="Nome do Herói" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:10px">
        <select id="input-class" style="width:100%; padding:15px; border-radius:10px; margin-bottom:20px">
            <option value="Guerreiro">GUERREIRO (FORÇA)</option>
            <option value="Arqueiro">ARQUEIRO (AGILIDADE)</option>
            <option value="Mago">MAGO (INTELIGÊNCIA)</option>
        </select>
        <button class="btn-action" style="width:100%" onclick="startMission()">INICIAR COMBATE</button>
    </div>

<script>
    let player = { name: "", class: "", lvl: 1, atk: 10, crit: 5, kills: 0, x: 20 };
    let monster = { hp: 100, maxHp: 100, x: 0 };
    let isAttacking = false;

    function startMission() {
        player.name = document.getElementById('input-name').value || "Recruta";
        player.class = document.getElementById('input-class').value;
        
        // Configuração de Estilo de Combate
        if(player.class === "Guerreiro") {
            player.atk = 15; player.range = "melee";
            document.getElementById('weapon-visual').style.height = "50px";
            document.getElementById('weapon-visual').style.background = "linear-gradient(#eee, #555)";
        } else if(player.class === "Arqueiro") {
            player.atk = 10; player.range = "ranged";
            document.getElementById('weapon-visual').style.height = "35px";
            document.getElementById('weapon-visual').style.width = "4px";
            document.getElementById('weapon-visual').style.background = "brown";
        } else {
            player.atk = 20; player.range = "magic";
            document.getElementById('weapon-visual').style.background = "cyan";
            document.getElementById('weapon-visual').style.boxShadow = "0 0 10px blue";
        }

        document.getElementById('modal-start').style.display = 'none';
        updateUI();
        gameLoop();
    }

    function updateUI() {
        document.getElementById('ui-name').innerText = player.name;
        document.getElementById('ui-class-label').innerText = "CLASSE: " + player.class;
        document.getElementById('stat-atk').innerText = player.atk;
        document.getElementById('stat-crit').innerText = player.crit + "%";
        document.getElementById('stat-lvl').innerText = player.lvl;
        document.getElementById('stat-kills').innerText = player.kills;
        document.getElementById('hp-fill').style.width = (monster.hp / monster.maxHp * 100) + "%";
    }

    function createProjectile(type) {
        const p = document.createElement('div');
        p.className = type === 'magic' ? 'projectile magic-ball' : 'projectile';
        p.style.left = (player.x + 40) + 'px';
        p.style.bottom = '100px';
        document.getElementById('game-arena').appendChild(p);

        let pos = player.x + 40;
        let interval = setInterval(() => {
            pos += 10;
            p.style.left = pos + 'px';
            if(pos > window.innerWidth - 100) {
                applyDamage();
                p.remove();
                clearInterval(interval);
            }
        }, 20);
    }

    function applyDamage() {
        const isCrit = Math.random() * 100 < player.crit;
        let dmg = player.atk + Math.floor(Math.random() * 5);
        if(isCrit) dmg *= 2;

        monster.hp -= dmg;
        
        // Feedback Visual de Impacto
        const mEl = document.getElementById('monster');
        const arena = document.getElementById('game-arena');
        mEl.classList.add('hit-flash');
        arena.classList.add('shake');
        
        setTimeout(() => {
            mEl.classList.remove('hit-flash');
            arena.classList.remove('shake');
        }, 150);

        if(monster.hp <= 0) {
            player.kills++;
            if(player.kills % 5 === 0) { player.lvl++; player.atk += 5; }
            monster.maxHp += 30;
            monster.hp = monster.maxHp;
        }
        updateUI();
    }

    function attack() {
        if(isAttacking) return;
        isAttacking = true;

        const pEl = document.getElementById('player');
        const arm = document.getElementById('player-arm');

        if(player.range === "melee") {
            // Guerreiro avança
            pEl.style.left = (window.innerWidth - 150) + "px";
            setTimeout(() => {
                arm.classList.add('swing');
                applyDamage();
                setTimeout(() => {
                    arm.classList.remove('swing');
                    pEl.style.left = "20px";
                    setTimeout(() => isAttacking = false, 300);
                }, 200);
            }, 300);
        } else {
            // Arqueiro/Mago atacam de longe
            arm.classList.add('swing');
            createProjectile(player.range);
            setTimeout(() => {
                arm.classList.remove('swing');
                isAttacking = false;
            }, 800);
        }
    }

    function gameLoop() {
        if(!isAttacking) attack();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
