<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Direto ao Ponto</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2d2d2d;
            --primary: #bb86fc;
            --success: #00C853;
            --danger: #D50000;
            --accent: #2962FF;
            --text: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* CORRIGIDO: user-select removido daqui para liberar os cliques */
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding-bottom: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid #2d2d2d;
        }

        .top-bar h2 {
            font-size: 18px;
            margin: 0;
            color: var(--primary);
        }

        .top-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .month-select {
            background: var(--bg-input);
            color: var(--text);
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        .card {
            background: var(--bg-card);
            margin: 15px 15px 0 15px;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .display-amount {
            font-size: 42px;
            font-weight: bold;
            text-align: center;
            margin: 10px 0 20px 0;
            color: var(--text);
            letter-spacing: 1px;
        }

        .keyboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .key {
            background: var(--bg-input);
            border: none;
            color: var(--text);
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            pointer-events: auto; /* CORRIGIDO: Força o navegador a aceitar os toques na tela */
            user-select: none; /* Deixa o bloqueio de cópia de texto apenas nas teclas */
        }

        .key:active { background: #444; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        
        .text-input {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text);
            box-sizing: border-box;
            font-size: 16px;
        }

        .tags-container { display: flex; gap: 8px; margin-top: 8px; overflow-x: auto; padding-bottom: 5px; }
        .tag { background: #2d2d2d; border: 1px solid #444; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
