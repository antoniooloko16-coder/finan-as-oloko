<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>METAL IDLE RPG: SOLDIER EDITION</title>
    <style>
        :root {
            --slug-khaki: #8b8b6a;
            --slug-metal: #4a4a4a;
            --slug-skin: #ffcc99;
            --slug-orange: #ff9000;
            --slug-army: #43523d;
        }

        body { background-color: #121212; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        #game-container { 
            width: 640px; 
            background-color: #222; 
            border: 4px solid #555; 
            box-shadow: 0 0 40px #000; 
            image-rendering: pixelated; 
            margin-top: 20px;
        }

        /* CENÁRIO ESTILO ARCADE */
        #stage-canvas {
            width: 100%; height: 280px;
            background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
            border-bottom: 8px solid var(--slug-army);
            position: relative; overflow: hidden;
        }

        .floor { position: absolute; bottom: 0; width: 100%; height: 40px; background: repeating-linear-gradient(90deg, #3d3d29, #3d3d29 20px, #2d2d1d 20px, #2d2d1d 40px); }

        /* PERSONAGEM MODULAR (ESTILO METAL SLUG) */
        #player-anchor {
            width: 60px; height: 90px; position: absolute; bottom: 40px; left: 100px;
            z-index: 10; transition: transform 0.1s;
        }

        .char-part { position: absolute; background-size: cover; }
        
        /* Cabeça com capacete */
        .head { width: 22px; height: 22px; background: var(--slug-skin); top: 0; left: 18px; border: 2px solid #000; border-radius: 4px; }
        .head::before { content: ''; position: absolute; top: -5px; width: 26px; height: 10px; background: var(--slug-army); left: -4px; border: 2px solid #000; border-radius: 5px; }

        /* Tronco/Colete */
        .torso { width: 30px; height: 35px; background: var(--slug-khaki); top: 24px; left: 14px; border: 2px solid #000; border-radius: 3px; }
        
        /* Braços e Pernas */
        .arm { width: 10px; height: 25px; background: var(--slug-skin); border: 2px solid #000; top: 26px; transform-origin: top; }
        .arm.right { right: 0; left: 40px; z-index: 12; }
        .arm.left { left: 4px; z-index: 5; }
        
        .leg { width: 12px; height: 28px; background: var(--slug-army); border: 2px solid #000; bottom: 0; }
        .leg.left { left: 14px; }
        .leg.right { left: 32px; }

        /* Arma */
        .weapon-sprite { 
            position: absolute; bottom: -10px; left: 5px; width: 40px; height: 12px; 
            background: var(--slug-metal); border: 2px solid #000; border-radius: 2px;
        }

        /* ANIMAÇÕES DE COMBATE */
        .anim-breathe { animation: breathe 1s infinite alternate; }
        @keyframes breathe { from { transform: scaleY(1); } to { transform: scaleY(0.95); } }

        .strike { animation: strike 0.2s ease-in-out; }
        @keyframes strike { 0% { transform: translateX(0) rotate(0deg); } 50% { transform: translateX(20px) rotate(-10deg); } 100% { transform: translateX(0) rotate(0deg); } }

        /* MONSTRO E IMPACTO */
        #monster-anchor { width: 70px; height: 70px; position: absolute; bottom: 40px; right: 50px; }
        .m-body { width: 100%; height: 100%; background: #556b2f; border: 3px solid #000; position: relative; border-radius: 8px; }
        .m-flash { filter: brightness(3) !important; transform: translateX(10px); }

        /* UI E TEXTO */
        .dmg-text { 
            position: absolute; font-weight: 900; font-size: 24px; color: #fff; 
            text-shadow: 2px 2px #000, -2px -2px #ff0000; animation: floatDmg 0.8s forwards; 
        }
        @keyframes floatDmg { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.5); } }

        .status-bar { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #000; border-top: 4px solid #555; }
        .hp-container { width: 100%; height: 20px; background: #333; border: 2px solid #fff; margin: 10px 0; }
        .hp-fill { height: 100%; background: #ff4757; width: 100%; transition: 0.3s; }
        
        .btn-start { padding: 15px 40px; font-size: 20px; background: var(--slug-orange); border: none; cursor: pointer; font-family: 'Courier New'; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-start" style="padding: 50px; text-align: center;">
        <h1 style="color: var(--slug-orange)">METAL IDLE RPG</h1>
        <p>RECRUTA, IDENTIFIQUE-SE:</p>
        <input type="text" id="p-name" value="SGT. SLUG" style="padding: 10px; margin-bottom: 10px;"><br>
        <select id="p-class" style="padding: 10px; margin-bottom: 20px;">
            <option value="Soldado">SOLDADO (FOR)</option>
            <option value="Sniper">SNIPER (AGI)</option>
            <option value="Engenheiro">ENGENHEIRO (INT)</option>
        </select><br>
        <button class="btn-start" onclick="initGame()">MISSION START</button>
    </div>

    <div id="screen-main" class="hidden" style="display:none">
        <div id="stage-canvas">
            <div class="floor"></div>
            
            <!-- PERSONAGEM HUMANIZADO -->
            <div id="player-anchor" class="anim-breathe">
                <div class="char-part leg left"></div>
                <div class="char-part leg right"></div>
                <div class="char-part arm left"></div>
                <div class="char-part torso"></div>
                <div class="char-part head"></div>
                <div class="char-part arm right" id="player-arm-main">
                    <div class="weapon-sprite" id="visual-weapon"></div>
                </div>
            </div>

            <!-- MONSTRO -->
            <div id="monster-anchor">
                <div class="m-body" id="monster-gfx">
                    <div style="position:absolute; top:15px; left:10px; width:10px; height:10px; background:#fff"></div>
                </div>
            </div>
        </div>

        <div class="hp-container"><div id="hp-bar" class="hp-fill"></div></div>

        <div class="status-bar">
            <div>
                <strong id="ui-name">---</strong><br>
                <small id="ui-class">---</small><br>
                <div id="ui-stats" style="margin-top:10px; font-size: 12px; color: #aaa;"></div>
            </div>
            <div>
                <strong>MISSAO: <span id="ui-stage">1</span></strong><br>
                KILLS: <span id="ui-kills">0</span>/10
                <div id="ui-inventory" style="margin-top:10px; font-size: 11px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let g = {
        player: { 
            lvl: 1, str: 10, agi: 10, int: 10, luk: 10, 
            exp: 0, nextExp: 100, kills: 0, weaponPower: 5 
        },
        monster: { hp: 50, maxHp: 50, lvl: 1 },
        stage: 1,
        isHitting: false
    };

    function initGame() {
        g.player.name = document.getElementById('p-name').value;
        g.player.class = document.getElementById('p-class').value;
        
        // Ajuste de atributos iniciais
        if(g.player.class === "Soldado") g.player.str += 15;
        if(g.player.class === "Sniper") g.player.agi += 15;
        if(g.player.class === "Engenheiro") g.player.int += 15;

        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-main').style.display = 'block';
        
        updateUI();
        gameLoop();
    }

    function calculateDamage() {
        // Lógica de Atributos: O "Dano Aleatório" solicitado
        let base = (g.player.str * 0.6) + (g.player.weaponPower * 2);
        if(g.player.class === "Sniper") base = (g.player.agi * 0.7) + (g.player.weaponPower * 1.5);
        if(g.player.class === "Engenheiro") base = (g.player.int * 0.8) + (g.player.weaponPower);

        // Variância (Hit Aleatório)
        let variance = 0.85 + (Math.random() * 0.3); // 85% a 115% do dano
        let damage = Math.floor(base * variance);

        // Crítico baseado em LUK
        let critChance = g.player.luk * 0.5;
        let isCrit = Math.random() * 100 < critChance;
        if(isCrit) damage = Math.floor(damage * 2);

        return { val: damage, crit: isCrit };
    }

    function executeAttack() {
        if(g.isHitting) return;
        g.isHitting = true;

        const arm = document.getElementById('player-arm-main');
        const mGfx = document.getElementById('monster-gfx');
        arm.classList.add('strike');

        const dmg = calculateDamage();
        g.monster.hp -= dmg.val;

        // Feedback de impacto
        showDamage(dmg.val, dmg.crit);
        mGfx.classList.add('m-flash');

        setTimeout(() => {
            arm.classList.remove('strike');
            mGfx.classList.remove('m-flash');
            g.isHitting = false;
            if(g.monster.hp <= 0) victory();
        }, 250);
    }

    function showDamage(val, crit) {
        const txt = document.createElement('div');
        txt.className = 'dmg-text';
        txt.innerHTML = crit ? `CRITICAL<br>${val}` : val;
        if(crit) txt.style.color = '#ff9000';
        txt.style.left = (450 + Math.random()*20) + 'px';
        txt.style.top = '100px';
        document.getElementById('stage-canvas').appendChild(txt);
        setTimeout(() => txt.remove(), 800);
    }

    function victory() {
        g.player.kills++;
        g.player.exp += 25 * g.stage;
        
        if(g.player.exp >= g.player.nextExp) levelUp();
        if(g.player.kills >= 10) {
            g.stage++;
            g.player.kills = 0;
        }

        // Spawn novo monstro escalonado
        g.monster.maxHp = 50 + (g.stage * 40);
        g.monster.hp = g.monster.maxHp;
        
        // Simular drop de arma visual
        g.player.weaponPower += Math.floor(Math.random() * 2);
        updateUI();
    }

    function levelUp() {
        g.player.lvl++;
        g.player.exp = 0;
        g.player.nextExp *= 1.4;
        g.player.str += 3; g.player.agi += 3; g.player.int += 3; g.player.luk += 2;
    }

    function updateUI() {
        document.getElementById('ui-name').innerText = `LVL.${g.player.lvl} ${g.player.name}`;
        document.getElementById('ui-class').innerText = `CARGO: ${g.player.class}`;
        document.getElementById('ui-stage').innerText = g.stage;
        document.getElementById('ui-kills').innerText = g.player.kills;
        document.getElementById('ui-stats').innerHTML = `
            FOR: ${g.player.str} | AGI: ${g.player.agi} | INT: ${g.player.int}<br>
            SORTE: ${g.player.luk}% CRIT | ARMA: +${g.player.weaponPower}
        `;
        // Cor da arma muda com o poder
        const colors = ['#4a4a4a', '#8b8b6a', '#ff9000', '#00ff00', '#00ffff'];
        const colorIdx = Math.min(Math.floor(g.player.weaponPower / 10), 4);
        document.getElementById('visual-weapon').style.backgroundColor = colors[colorIdx];
    }

    function gameLoop() {
        // HP Bar
        const pct = (g.monster.hp / g.monster.maxHp) * 100;
        document.getElementById('hp-bar').style.width = pct + "%";

        // Auto-ataque baseado na Agilidade
        let attackSpeed = Math.max(500, 2000 - (g.player.agi * 20));
        
        if(!g.isHitting) {
            executeAttack();
        }

        setTimeout(() => requestAnimationFrame(gameLoop), attackSpeed / 60);
    }
</script>
</body>
</html>
